<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingredients | IMPACT Food Tag</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }
      .modal-overlay.active {
        display: flex !important;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc] flex h-screen overflow-hidden">
    <div id="sidebar-container" class="shrink-0 h-full z-20"></div>

    <div
      class="flex-1 flex flex-col h-full overflow-hidden relative bg-[#f1f5f9]"
    >
      <header
        class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center z-20 shrink-0"
      >
        <div>
          <h1
            class="text-2xl font-extrabold text-slate-800 tracking-tight leading-none"
          >
            Ingredients Gallery
          </h1>
          <p class="text-sm text-slate-500 font-medium mt-1">
            คลังส่วนผสมและข้อมูลภูมิแพ้
          </p>
        </div>
      </header>

      <main class="flex-1 flex flex-col p-8 overflow-hidden z-10">
        <div
          class="bg-white p-5 rounded-t-2xl border border-slate-200 border-b-0 flex justify-between items-center shrink-0"
        >
          <div class="flex items-center gap-3 w-full max-w-2xl">
            <div class="w-full relative">
              <span
                class="material-symbols-outlined absolute left-4 top-3 text-slate-400 pointer-events-none"
                >search</span
              >
              <input
                type="text"
                id="searchInput"
                onkeyup="filterIngredients()"
                placeholder="ค้นหาส่วนผสม..."
                class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#f97316] focus:bg-white transition-all shadow-sm text-sm"
              />
            </div>

            <div class="flex items-center gap-1 shrink-0">
              <button
                id="btnListView"
                onclick="setView('list')"
                class="w-11 h-11 flex items-center justify-center rounded-xl bg-[#fff7ed] text-[#f97316] transition-all"
                title="List View"
              >
                <span class="material-symbols-outlined">view_list</span>
              </button>
              <button
                id="btnGridView"
                onclick="setView('grid')"
                class="w-11 h-11 flex items-center justify-center rounded-xl text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all"
                title="Grid View"
              >
                <span class="material-symbols-outlined">grid_view</span>
              </button>
            </div>
          </div>

          <div class="flex items-center gap-4 shrink-0">
            <div
              class="px-4 py-2.5 bg-[#fff7ed] text-[#ea580c] font-bold rounded-xl text-sm flex items-center gap-2 border border-[#ffedd5]"
            >
              <span class="material-symbols-outlined text-[18px]">layers</span>
              <span id="countNumber">0</span> รายการ
            </div>

            <label
              class="px-6 py-3 bg-[#f97316] text-white font-bold rounded-xl hover:bg-[#ea580c] transition-all flex items-center gap-2 shadow-sm shadow-[#f97316]/20 cursor-pointer active:scale-95"
            >
              <span class="material-symbols-outlined text-[20px]"
                >add_photo_alternate</span
              >
              เพิ่มรูปภาพ
              <input
                type="file"
                id="inputIngImage"
                accept="image/*"
                multiple
                class="hidden"
                onchange="previewMultipleImages(event)"
              />
            </label>
          </div>
        </div>

        <div
          class="bg-white border border-slate-200 rounded-b-2xl flex-1 overflow-auto shadow-xl shadow-slate-200/50 custom-scroll p-6"
        >
          <div
            id="ingGallery"
            class="flex flex-col gap-4 w-full max-w-5xl mx-auto"
          >
            <div
              class="col-span-full py-20 text-center text-slate-400 font-medium"
            >
              <span class="material-symbols-outlined text-5xl animate-spin"
                >progress_activity</span
              >
              <p class="mt-4 font-bold tracking-widest">LOADING DATABASE...</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="uploadModal" class="modal-overlay">
      <div
        class="bg-white rounded-3xl shadow-2xl w-[650px] max-h-[85vh] flex flex-col relative z-50 overflow-hidden"
      >
        <div
          class="px-8 py-6 border-b flex justify-between items-center bg-slate-50 shrink-0"
        >
          <div>
            <h2 class="text-xl font-bold text-slate-800">Upload Icons</h2>
            <p class="text-xs text-slate-500 font-medium">
              ตรวจสอบและยืนยันการนำเข้าสู่ฐานข้อมูล
            </p>
          </div>
          <button
            type="button"
            onclick="closeUploadModal()"
            class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-white hover:text-slate-600 rounded-full transition-all cursor-pointer"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div class="p-8 overflow-y-auto custom-scroll flex-1 bg-white">
          <div
            id="multiplePreviewContainer"
            class="flex flex-wrap justify-center gap-4"
          ></div>
        </div>

        <div class="p-6 bg-slate-50 border-t flex justify-end gap-3 shrink-0">
          <button
            type="button"
            onclick="closeUploadModal()"
            class="px-6 py-2.5 text-slate-500 font-bold hover:text-slate-700 transition-colors cursor-pointer"
          >
            Cancel
          </button>
          <button
            type="button"
            id="saveIngBtn"
            onclick="saveIngredient()"
            class="px-8 py-2.5 bg-[#f97316] text-white font-bold rounded-xl hover:bg-[#ea580c] shadow-lg shadow-[#f97316]/20 transition-all cursor-pointer flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-[20px]">upload</span>
            Upload to Database
          </button>
        </div>
      </div>
    </div>

    <div id="editModal" class="modal-overlay">
      <div
        class="bg-white rounded-3xl shadow-2xl w-[500px] flex flex-col relative z-50 overflow-hidden"
      >
        <div
          class="px-8 py-6 border-b flex justify-between items-center bg-slate-50 shrink-0"
        >
          <div>
            <h2 class="text-xl font-bold text-slate-800">Edit Ingredient</h2>
            <p class="text-xs text-slate-500 font-medium">
              แก้ไขข้อมูลหรือเปลี่ยนรูปภาพใหม่
            </p>
          </div>
          <button
            type="button"
            onclick="closeEditModal()"
            class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-white hover:text-slate-600 rounded-full transition-all cursor-pointer"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div class="p-10 space-y-8 bg-white">
          <input type="hidden" id="editIngId" />

          <div
            class="flex justify-center relative group w-32 h-32 mx-auto cursor-pointer"
            onclick="document.getElementById('editIngImageInput').click()"
            title="คลิกเพื่อเปลี่ยนรูปภาพ"
          >
            <div
              class="w-full h-full bg-slate-50 border-2 border-slate-200 rounded-[2rem] p-6 flex items-center justify-center shadow-sm overflow-hidden hover:border-[#f97316]/50 hover:bg-[#fff7ed] transition-all"
            >
              <img
                id="editIngImage"
                src=""
                class="w-full h-full object-contain"
              />
            </div>
            <div
              class="absolute inset-0 bg-slate-900/50 backdrop-blur-[2px] rounded-[2rem] flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <span
                class="material-symbols-outlined text-white text-[28px] mb-1"
                >photo_camera</span
              >
              <span class="text-xs font-bold text-white tracking-wider"
                >เปลี่ยนรูป</span
              >
            </div>
            <input
              type="file"
              id="editIngImageInput"
              accept="image/*"
              class="hidden"
              onchange="previewEditImage(event)"
            />
          </div>

          <div>
            <label
              class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2"
              >Ingredient Name</label
            >
            <input
              type="text"
              id="editName"
              class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#f97316] focus:bg-white transition-all font-bold text-slate-700"
              placeholder="e.g. Egg (ไข่)"
            />
            <p class="text-[11px] text-slate-400 mt-2 font-medium">
              รูปแบบที่แนะนำ:
              <span class="font-bold text-slate-500"
                >English Name (ชื่อภาษาไทย)</span
              >
            </p>
          </div>
        </div>

        <div class="p-6 bg-slate-50 border-t flex justify-end gap-3 shrink-0">
          <button
            type="button"
            onclick="closeEditModal()"
            class="px-6 py-3 text-slate-500 font-bold hover:text-slate-700 transition-colors cursor-pointer"
          >
            Cancel
          </button>
          <button
            type="button"
            id="saveEditBtn"
            onclick="saveEditIngredient()"
            class="px-8 py-3 bg-[#006d4b] text-white font-bold rounded-xl hover:bg-[#005a3d] shadow-lg shadow-[#006d4b]/20 transition-all cursor-pointer flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-[18px]">save</span> Save
            Changes
          </button>
        </div>
      </div>
    </div>

    <script src="sidebar.js"></script>

    <script>
      const supabaseUrl = "https://nexvompdeubppbkvnwor.supabase.co";
      const supabaseKey = "sb_publishable_cMshOGrGdX829-KmtIxOWw_HeC04-aI";
      const dbClient = supabase.createClient(supabaseUrl, supabaseKey);

      let dbIngredients = [];
      let currentViewType = "list";
      let editImageFile = null;

      async function fetchIngredients() {
        try {
          const { data, error } = await dbClient
            .from("ingredients")
            .select("*")
            .order("id", { ascending: false });

          if (error) throw error;
          dbIngredients = data || [];
          renderIngList();
        } catch (err) {
          console.error("Error fetching ingredients", err);
          document.getElementById("ingGallery").innerHTML =
            `<div class="col-span-full py-20 text-center text-red-400 font-bold">⚠️ Error loading data: ${err.message}</div>`;
        }
      }

      function setView(type) {
        currentViewType = type;
        const btnGrid = document.getElementById("btnGridView");
        const btnList = document.getElementById("btnListView");

        if (type === "grid") {
          btnGrid.className =
            "w-11 h-11 flex items-center justify-center rounded-xl bg-[#fff7ed] text-[#f97316] transition-all";
          btnList.className =
            "w-11 h-11 flex items-center justify-center rounded-xl text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all";
        } else {
          btnList.className =
            "w-11 h-11 flex items-center justify-center rounded-xl bg-[#fff7ed] text-[#f97316] transition-all";
          btnGrid.className =
            "w-11 h-11 flex items-center justify-center rounded-xl text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all";
        }

        renderIngList();
        filterIngredients();
      }

      function renderIngList() {
        const gallery = document.getElementById("ingGallery");

        document.getElementById("countNumber").innerText = dbIngredients.length;

        if (dbIngredients.length === 0) {
          gallery.className =
            "flex flex-col items-center justify-center py-24 w-full h-full";
          gallery.innerHTML = `
            <div class="flex flex-col items-center justify-center text-slate-400 bg-white rounded-3xl border border-slate-200 border-dashed w-full max-w-2xl py-24 mx-auto">
                <span class="material-symbols-outlined text-6xl mb-3 opacity-40">imagesmode</span>
                <p class="font-bold text-lg text-slate-500 uppercase tracking-widest">No Images Found</p>
                <p class="text-sm mt-1">กดปุ่มเพิ่มรูปภาพด้านบนเพื่อเริ่มต้น</p>
            </div>`;
          return;
        }

        if (currentViewType === "grid") {
          gallery.className =
            "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-6";
          gallery.innerHTML = dbIngredients
            .map((ing, index) => {
              let displayName = ing.name_th || "";
              if (ing.name_en && ing.name_en !== ing.name_th) {
                displayName = `${ing.name_en} (${ing.name_th})`;
              } else if (!ing.name_th && ing.name_en) {
                displayName = ing.name_en;
              }

              return `
              <div class="ing-item bg-white border border-slate-200 rounded-2xl p-5 flex flex-col items-center justify-center hover:shadow-lg transition-all group relative overflow-hidden" data-name="${(ing.name_th || "").toLowerCase()} ${(ing.name_en || "").toLowerCase()}">
                
                <div class="absolute top-3 left-3 bg-slate-100 text-slate-400 text-[10px] font-black px-2 py-0.5 rounded-lg z-10 border border-slate-200">
                    ${index + 1}
                </div>

                <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-[2px] transition-all flex items-center justify-center gap-3 opacity-0 group-hover:opacity-100 z-20">
                    <button onclick="openEditModal('${ing.id}')" class="w-11 h-11 bg-white hover:bg-emerald-50 text-[#006d4b] rounded-full shadow-lg flex items-center justify-center transform translate-y-2 group-hover:translate-y-0 transition-all duration-200" title="Edit">
                        <span class="material-symbols-outlined text-[20px]">edit</span>
                    </button>
                    <button onclick="deleteIngredient('${ing.id}')" class="w-11 h-11 bg-white hover:bg-red-50 text-red-500 rounded-full shadow-lg flex items-center justify-center transform translate-y-2 group-hover:translate-y-0 transition-all duration-200 delay-75" title="Delete">
                        <span class="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                </div>

                <div class="w-14 h-14 flex items-center justify-center relative bg-slate-50 rounded-xl p-2 border border-slate-100 mt-2">
                    <img src="${ing.icon_url}" class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-300" loading="lazy" onerror="this.style.display='none'">
                </div>
                
                <div class="mt-3 w-full px-2">
                    <h4 class="font-black text-slate-800 text-[11px] tracking-wide text-center w-full truncate" title="${displayName}">${displayName || "-"}</h4>
                </div>
              </div>
            `;
            })
            .join("");
        } else {
          gallery.className = "flex flex-col gap-4 w-full max-w-5xl mx-auto";
          gallery.innerHTML = dbIngredients
            .map((ing, index) => {
              let displayName = ing.name_th || "";
              if (ing.name_en && ing.name_en !== ing.name_th) {
                displayName = `${ing.name_en} (${ing.name_th})`;
              } else if (!ing.name_th && ing.name_en) {
                displayName = ing.name_en;
              }

              return `
              <div class="ing-item flex items-center justify-between bg-white border border-slate-200 rounded-[1.25rem] p-4 hover:shadow-md transition-all group" data-name="${(ing.name_th || "").toLowerCase()} ${(ing.name_en || "").toLowerCase()}">
                 <div class="flex items-center w-full overflow-hidden pr-4">
                    
                    <div class="text-[15px] font-black text-slate-300 w-14 text-center shrink-0">
                        ${index + 1}
                    </div>

                    <div class="w-[60px] h-[60px] bg-slate-50 rounded-xl p-2 border border-slate-100 flex items-center justify-center shrink-0 mr-5">
                        <img src="${ing.icon_url}" class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-300" loading="lazy" onerror="this.style.display='none'">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-slate-800 text-[15px] tracking-wide truncate" title="${displayName}">${displayName || "-"}</h4>
                    </div>
                 </div>
                 
                 <div class="flex items-center gap-1 shrink-0 pr-2 opacity-60 group-hover:opacity-100 transition-opacity">
                     <button onclick="openEditModal('${ing.id}')" class="text-slate-400 hover:text-[#006d4b] hover:bg-emerald-50 p-2.5 rounded-full transition-all" title="Edit">
                          <span class="material-symbols-outlined text-[22px]">edit</span>
                     </button>
                     <button onclick="deleteIngredient('${ing.id}')" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-full transition-all" title="Delete">
                          <span class="material-symbols-outlined text-[22px]">delete</span>
                     </button>
                 </div>
              </div>
            `;
            })
            .join("");
        }
      }

      function openEditModal(id) {
        const ing = dbIngredients.find((i) => i.id == id);
        if (!ing) return;

        document.getElementById("editIngId").value = ing.id;

        let combinedName = ing.name_th || "";
        if (ing.name_en && ing.name_en !== ing.name_th) {
          combinedName = `${ing.name_en} (${ing.name_th})`;
        }
        if (!ing.name_th && ing.name_en) {
          combinedName = ing.name_en;
        }

        document.getElementById("editName").value = combinedName;
        document.getElementById("editIngImage").src = ing.icon_url;
        document.getElementById("editIngImageInput").value = "";
        editImageFile = null;

        document.getElementById("editModal").classList.add("active");
      }

      function closeEditModal() {
        document.getElementById("editModal").classList.remove("active");
        editImageFile = null;
      }

      function previewEditImage(e) {
        const file = e.target.files[0];
        if (file) {
          editImageFile = file;
          const reader = new FileReader();
          reader.onload = (ev) => {
            document.getElementById("editIngImage").src = ev.target.result;
          };
          reader.readAsDataURL(file);
        }
      }

      async function saveEditIngredient() {
        const id = document.getElementById("editIngId").value;
        const rawName = document.getElementById("editName").value.trim();

        const btn = document.getElementById("saveEditBtn");
        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span> Saving...`;

        try {
          let nameEn = rawName;
          let nameTh = rawName;

          const match = rawName.match(/(.+?)\s*\((.+)\)/);
          if (match) {
            nameEn = match[1].trim();
            nameTh = match[2].trim();
          }

          let updatePayload = {
            name_th: nameTh,
            name_en: nameEn,
          };

          if (editImageFile) {
            const fileName = `img_update_${Date.now()}.png`;
            const { error: uploadError } = await dbClient.storage
              .from("ingredients")
              .upload(fileName, editImageFile);

            if (uploadError) throw uploadError;

            const { data: urlData } = dbClient.storage
              .from("ingredients")
              .getPublicUrl(fileName);

            updatePayload.icon_url = urlData.publicUrl;
          }

          const { error } = await dbClient
            .from("ingredients")
            .update(updatePayload)
            .eq("id", id);

          if (error) throw error;

          closeEditModal();
          fetchIngredients();
        } catch (e) {
          alert("Error: " + e.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">save</span> Save Changes`;
        }
      }

      function filterIngredients() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const items = document.querySelectorAll(".ing-item");
        let visibleCount = 0;

        items.forEach((item) => {
          const name = item.getAttribute("data-name");
          if (name.includes(query)) {
            item.style.display = "flex";
            visibleCount++;
          } else {
            item.style.display = "none";
          }
        });

        document.getElementById("countNumber").innerText = visibleCount;
      }

      function previewMultipleImages(e) {
        const files = e.target.files;
        const container = document.getElementById("multiplePreviewContainer");

        container.innerHTML = "";

        if (files.length > 0) {
          for (let i = 0; i < files.length; i++) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const rawName = files[i].name.replace(/\.[^/.]+$/, "");
              container.innerHTML += `
                        <div class="flex flex-col items-center bg-white p-4 rounded-2xl border border-slate-200 shadow-sm w-[110px]">
                            <img src="${ev.target.result}" class="w-12 h-12 object-contain mb-3">
                            <span class="text-[10px] font-bold text-slate-600 truncate w-full text-center" title="${rawName}">${rawName}</span>
                        </div>
                    `;
            };
            reader.readAsDataURL(files[i]);
          }

          document.getElementById("uploadModal").classList.add("active");
        }
      }

      function closeUploadModal() {
        document.getElementById("uploadModal").classList.remove("active");
        document.getElementById("inputIngImage").value = "";
      }

      async function saveIngredient() {
        const files = document.getElementById("inputIngImage").files;
        if (files.length === 0) return;

        const btn = document.getElementById("saveIngBtn");
        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined text-[20px] animate-spin">progress_activity</span> Uploading ${files.length}...`;

        try {
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const rawName = file.name.replace(/\.[^/.]+$/, "");
            const fileName = `img_${Date.now()}_${i}.png`;

            let nameEn = rawName;
            let nameTh = rawName;

            const match = rawName.match(/(.+?)\s*\((.+)\)/);
            if (match) {
              nameEn = match[1].trim();
              nameTh = match[2].trim();
            }

            const { error: uploadError } = await dbClient.storage
              .from("ingredients")
              .upload(fileName, file);
            if (uploadError) throw uploadError;

            const { data: urlData } = dbClient.storage
              .from("ingredients")
              .getPublicUrl(fileName);

            const { error: dbError } = await dbClient
              .from("ingredients")
              .insert({
                name_th: nameTh,
                name_en: nameEn,
                icon_url: urlData.publicUrl,
              });
            if (dbError) throw dbError;
          }

          closeUploadModal();
          fetchIngredients();
        } catch (e) {
          alert("Error: " + e.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<span class="material-symbols-outlined text-[20px]">upload</span> Upload to Database`;
        }
      }

      async function deleteIngredient(id) {
        if (confirm("Are you sure you want to delete this image?")) {
          try {
            const { error } = await dbClient
              .from("ingredients")
              .delete()
              .eq("id", id);
            if (error) throw error;
            fetchIngredients();
          } catch (e) {
            alert("Delete failed: " + e.message);
          }
        }
      }

      window.onload = fetchIngredients;
    </script>
  </body>
</html>
