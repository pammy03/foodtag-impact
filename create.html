<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Tag Profile | IMPACT Food Tag</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Mali:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body {
        font-family: "Inter", sans-serif;
      }

      /* ===== ALLERGEN STYLES ===== */
      .allergen-icon {
        width: 60px;
        height: 60px;
        object-fit: contain;
        border-radius: 6px;
        display: block;
      }
      .allergen-container {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        justify-content: center;
        align-items: flex-start;
        margin: 10px auto 0;
        padding: 0;
        width: calc(5 * 60px + 4 * 4px);
      }
      /* ============================= */

      .slot-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 0;
      }
      .slot-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .a4-paper {
        background: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        transform-origin: center center;
        transition: outline 0.3s;
      }
      .inner-grid {
        display: grid;
        margin: auto;
        border-top: 1px dashed #cbd5e1;
        border-left: 1px dashed #cbd5e1;
        background-color: white;
      }
      .grid-plate {
        grid-template-columns: repeat(2, 13cm);
        grid-template-rows: repeat(1, 18cm);
      }
      .grid-western {
        grid-template-columns: repeat(2, 10.5cm);
        grid-template-rows: repeat(2, 14.8cm);
      }
      .grid-buffet {
        grid-template-columns: repeat(3, 9.9cm);
        grid-template-rows: repeat(2, 9.7cm);
      }
      .slot {
        border-right: 1px dashed #cbd5e1;
        border-bottom: 1px dashed #cbd5e1;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: white;
        transition: all 0.2s;
        overflow: hidden;
      }
      .slot.active {
        outline: 3px solid #006d4b;
        outline-offset: -3px;
        background-color: #f8fafc;
        z-index: 10;
      }
      aside .scroll-area::-webkit-scrollbar {
        width: 4px;
      }
      aside .scroll-area::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      @media print {
        @page {
          size: auto;
          margin: 0;
        }
        body {
          margin: 0;
          padding: 0;
          background: white;
          overflow: visible !important;
        }
        header,
        aside,
        .preview-header {
          display: none !important;
        }
        main {
          padding: 0 !important;
          background: white !important;
          display: block !important;
          overflow: visible !important;
        }
        #paperContainer {
          display: block !important;
          width: 100% !important;
          height: 100% !important;
          padding: 0 !important;
        }
        #a4Paper {
          transform: none !important;
          box-shadow: none !important;
          margin: 0 !important;
        }
        #a4Paper.landscape {
          width: 297mm !important;
          height: 210mm !important;
        }
        #a4Paper.portrait {
          width: 210mm !important;
          height: 297mm !important;
        }
        .slot.active {
          outline: none !important;
          background-color: white !important;
        }
        .print\:hidden {
          display: none !important;
        }
        .allergen-icon {
          width: 52px !important;
          height: 52px !important;
        }
        .allergen-container {
          grid-template-columns: repeat(5, 52px) !important;
          gap: 3px !important;
          margin-top: 8px !important;
        }
      }
      .template-btn.selected {
        border-color: #006d4b;
        background-color: #f0fdf4;
        box-shadow: 0 0 0 1px #006d4b;
      }
    </style>
  </head>

    <script>
      const supabaseUrl = "https://nexvompdeubppbkvnwor.supabase.co";
      const supabaseKey = "sb_publishable_cMshOGrGdX829-KmtIxOWw_HeC04-aI";
      const dbClient = supabase.createClient(supabaseUrl, supabaseKey);

      let currentTemplateConfig = {};
      let activeSlot = 1;
      let slotsData = {};
      let isInitialLoading = false;

      const DEFAULT_FONT_TH = "'Sarabun', sans-serif";
      const DEFAULT_FONT_EN = "'Inter', sans-serif";
      const DEFAULT_SIZE_TH = "22px";
      const DEFAULT_SIZE_EN = "22px";

      const urlParams = new URLSearchParams(window.location.search);
      const editId = urlParams.get("edit");

      window.onload = () => {
        if (editId) {
          isInitialLoading = true;
          document.getElementById("pageTitle").innerText = "Edit Tag Profile";
          document.getElementById("saveButtonText").innerText =
            "Update Profile";

          const savedTags = JSON.parse(localStorage.getItem("savedTags")) || [];
          const tagToEdit = savedTags.find((t) => t.id === editId);

          if (tagToEdit) {
            document.getElementById("profileName").value = tagToEdit.title;
            slotsData = tagToEdit.slotsData || {};

            const mockConfigs = {
              "Plate / Food Stall": {
                name: "Plate / Food Stall",
                orientation: "landscape",
                slots_count: 2,
                grid_class: "grid-plate",
                hide_allergies: false,
              },
              "Western Set": {
                name: "Western Set",
                orientation: "portrait",
                slots_count: 4,
                grid_class: "grid-western",
                hide_allergies: false,
              },
              "Buffet / Coffee Break": {
                name: "Buffet / Coffee Break",
                orientation: "landscape",
                slots_count: 6,
                grid_class: "grid-buffet",
                hide_allergies: false,
              },
            };

            const config = mockConfigs[tagToEdit.templateName];
            if (config) {
              const btnIdxMap = {
                "Plate / Food Stall": 0,
                "Western Set": 1,
                "Buffet / Coffee Break": 2,
              };
              const targetBtn =
                document.querySelectorAll(".template-btn")[
                  btnIdxMap[tagToEdit.templateName]
                ];

              applyTemplate(config, targetBtn);

              setTimeout(() => {
                for (let i = 1; i <= config.slots_count; i++) {
                  const slotDiv = document.getElementById(`slot-${i}`);
                  if (slotDiv) {
                    const wrapper = slotDiv.querySelector("div:last-child");
                    const menu = slotsData[i] || {};
                    renderSlotContent(wrapper, menu, i);
                  }
                }
                if (slotsData[1]) updateInputs(slotsData[1]);
                resizePaper();
              }, 300);
            }
          }
          isInitialLoading = false;
        } else {
          applyTemplate(
            {
              name: "Buffet / Coffee Break",
              orientation: "landscape",
              slots_count: 6,
              grid_class: "grid-buffet",
              hide_allergies: false,
            },
            document.querySelectorAll(".template-btn")[2],
          );
        }
      };

      function resizePaper() {
        const container = document.getElementById("paperContainer");
        const paper = document.getElementById("a4Paper");
        if (!container || !paper || !currentTemplateConfig.orientation) return;
        const cWidth = container.clientWidth - 40;
        const cHeight = container.clientHeight - 40;
        let pWidth =
          currentTemplateConfig.orientation === "landscape" ? 1123 : 794;
        let pHeight =
          currentTemplateConfig.orientation === "landscape" ? 794 : 1123;
        paper.style.width = `${pWidth}px`;
        paper.style.height = `${pHeight}px`;

        if (currentTemplateConfig.orientation === "landscape") {
          paper.classList.add("landscape");
          paper.classList.remove("portrait");
        } else {
          paper.classList.add("portrait");
          paper.classList.remove("landscape");
        }

        const scale = Math.min(cWidth / pWidth, cHeight / pHeight);
        paper.style.transform = `scale(${scale})`;
      }

      window.addEventListener("resize", resizePaper);

      function applyTemplate(temp, btnElement) {
        currentTemplateConfig = temp;
        document
          .querySelectorAll(".template-btn")
          .forEach((btn) => btn.classList.remove("selected"));
        if (btnElement) btnElement.classList.add("selected");

        if (!isInitialLoading) slotsData = {};
        activeSlot = 1;

        loadBackgrounds(temp.name).then(() => {
          setupGridStructure();
          renderSlotControls(temp.slots_count);
          clearInputs();
          setTimeout(resizePaper, 50);
        });
      }

      function setupGridStructure() {
        const innerGrid = document.getElementById("innerGrid");
        innerGrid.className = `inner-grid ${currentTemplateConfig.grid_class}`;
        document.getElementById("allergenSection").style.display =
          currentTemplateConfig.hide_allergies ? "none" : "block";
        innerGrid.innerHTML = "";

        for (let i = 1; i <= currentTemplateConfig.slots_count; i++) {
          const div = document.createElement("div");
          div.id = `slot-${i}`;
          div.className = `slot ${i === activeSlot ? "active" : ""}`;
          const indicator = document.createElement("div");
          indicator.className = `absolute top-2 right-2 text-[10px] font-bold px-2 py-0.5 rounded print:hidden z-20 transition-colors hidden-on-export ${i === activeSlot ? "bg-[#006d4b] text-white shadow-sm" : "bg-slate-100 text-slate-400"}`;
          indicator.innerText =
            i === activeSlot ? `Slot ${i} (Editing...)` : `Slot ${i}`;
          div.appendChild(indicator);

          const contentWrapper = document.createElement("div");
          contentWrapper.className =
            "w-full h-full flex flex-col items-center justify-center relative z-10 p-6";
          div.appendChild(contentWrapper);
          innerGrid.appendChild(div);

          if (!slotsData[i]) {
            slotsData[i] = { bgUrl: "" };
          } else if (!slotsData[i].bgUrl) {
            slotsData[i].bgUrl = "";
          }

          renderSlotContent(contentWrapper, slotsData[i], i);
        }

        syncBgSelectWithCurrentSlot();
      }

      function renderSlotContent(element, menu, index) {
        const showAllergies = !currentTemplateConfig.hide_allergies;

        const slotBgUrl = menu.bgUrl || "";
        const bgHtml = slotBgUrl
          ? `<img src="${slotBgUrl}" class="slot-bg">`
          : "";

        if (!menu.name_th && !menu.name_en) {
          element.innerHTML = bgHtml + `<div class="slot-content"></div>`;
          return;
        }

        const fTh = menu.fontTh || DEFAULT_FONT_TH;
        const sTh = menu.fontSizeTh || DEFAULT_SIZE_TH;
        const fEn = menu.fontEn || DEFAULT_FONT_EN;
        const sEn = menu.fontSizeEn || DEFAULT_SIZE_EN;

        // ===== ALLERGEN HTML — แสดงเป็น grid ไอคอน + ชื่อ =====
        const allergensHtml =
          showAllergies && menu.allergens && menu.allergens.length > 0
            ? `<div class="allergen-container">` +
              menu.allergens
                .map((a) => {
                  const imgUrl =
                    a.icon_url ||
                    a.image_url ||
                    "https://via.placeholder.com/40/ffffff/cccccc?text=IMG";
                  const nameText = a.name_th || a.name_en || "";
                  return `<img src="${imgUrl}" class="allergen-icon" title="${nameText}" crossorigin="anonymous">`;
                })
                .join("") +
              `</div>`
            : "";

        element.innerHTML = `
            ${bgHtml}
            <div class="slot-content">
              <img src="Impact_Logo.png" class="h-6 opacity-30 mb-4" alt="logo" onerror="this.style.display='none'">
              <div class="slot-text-th font-black text-slate-800 mb-2 leading-relaxed text-center whitespace-pre-line" style="font-family: ${fTh}; font-size: ${sTh};">${menu.name_th || ""}</div>
              <div class="slot-text-en font-medium text-slate-500 mb-4 leading-relaxed text-center whitespace-pre-line" style="font-family: ${fEn}; font-size: ${sEn};">${menu.name_en || ""}</div>
              ${allergensHtml}
            </div>
        `;
      }

      function renderSlotControls(count) {
        const container = document.getElementById("slotControls");
        container.innerHTML = "";
        for (let i = 1; i <= count; i++) {
          const btn = document.createElement("button");
          btn.className = `py-2 rounded-lg border font-bold text-xs transition-all ${i === activeSlot ? "bg-[#006d4b] border-[#006d4b] text-white shadow-md" : "bg-white text-slate-600 hover:bg-slate-50"}`;
          btn.innerText = `Slot ${i}`;
          btn.onclick = () => {
            activeSlot = i;
            renderSlotControls(count);
            document
              .querySelectorAll(".slot")
              .forEach((s) => s.classList.remove("active"));

            const currentSlot = document.getElementById(`slot-${i}`);
            currentSlot.classList.add("active");

            document
              .querySelectorAll(".slot > div:first-child")
              .forEach((el, idx) => {
                el.innerText =
                  idx + 1 === activeSlot
                    ? `Slot ${idx + 1} (Editing...)`
                    : `Slot ${idx + 1}`;
                el.className = `absolute top-2 right-2 text-[10px] font-bold px-2 py-0.5 rounded print:hidden z-20 transition-colors hidden-on-export ${idx + 1 === activeSlot ? "bg-[#006d4b] text-white shadow-sm" : "bg-slate-100 text-slate-400"}`;
              });

            if (slotsData[i]) {
              updateInputs(slotsData[i]);
            } else {
              clearInputs();
            }

            syncBgSelectWithCurrentSlot();
          };
          container.appendChild(btn);
        }
      }

      function syncBgSelectWithCurrentSlot() {
        const select = document.getElementById("bgSelect");
        const currentBg = slotsData[activeSlot]?.bgUrl || "";
        select.value = currentBg;
      }

      function updateInputs(menu) {
        document.getElementById("nameTh").innerText = menu.name_th || "";
        document.getElementById("nameEn").innerText = menu.name_en || "";
        document.getElementById("menuSearch").value = menu.name_th
          ? menu.name_th.split("\n")[0]
          : "";

        document.getElementById("fontSelectTh").value =
          menu.fontTh || DEFAULT_FONT_TH;
        document.getElementById("fontSizeTh").value = parseInt(
          menu.fontSizeTh || DEFAULT_SIZE_TH,
        );
        document.getElementById("fontSelectEn").value =
          menu.fontEn || DEFAULT_FONT_EN;
        document.getElementById("fontSizeEn").value = parseInt(
          menu.fontSizeEn || DEFAULT_SIZE_EN,
        );

        const list = document.getElementById("allergenList");
        if (menu.allergens && menu.allergens.length > 0) {
          list.innerHTML = menu.allergens
            .map((a) => {
              const imgUrl =
                a.icon_url ||
                a.image_url ||
                "https://via.placeholder.com/40/ffffff/cccccc?text=IMG";
              const displayName = a.name_th || a.name_en || "Unknown";
              return `<div class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-100 rounded-lg shadow-sm">
                <img src="${imgUrl}" class="w-8 h-8 object-contain rounded border border-slate-200 bg-white p-0.5" onerror="this.src='https://placehold.co/100x100/e2e8f0/94a3b8?text=No+Image'">
                <span class="text-xs font-bold text-slate-700 uppercase tracking-widest">${displayName}</span>
             </div>`;
            })
            .join("");
        } else {
          list.innerHTML = `<div class="text-xs text-slate-400 italic">No images assigned</div>`;
        }
      }

      function clearInputs() {
        document.getElementById("nameTh").innerText = "";
        document.getElementById("nameEn").innerText = "";
        document.getElementById("menuSearch").value = "";
        document.getElementById("allergenList").innerHTML = "";

        document.getElementById("fontSelectTh").value = DEFAULT_FONT_TH;
        document.getElementById("fontSizeTh").value = parseInt(DEFAULT_SIZE_TH);
        document.getElementById("fontSelectEn").value = DEFAULT_FONT_EN;
        document.getElementById("fontSizeEn").value = parseInt(DEFAULT_SIZE_EN);
      }

      function clearCurrentSlot() {
        if (
          confirm(`ต้องการลบข้อมูลทั้งหมดของ Slot ${activeSlot} ใช่หรือไม่?`)
        ) {
          slotsData[activeSlot] = { bgUrl: "" };
          clearInputs();
          syncBgSelectWithCurrentSlot();
          renderActiveSlotOnly();
        }
      }

      function applyToAllSlots() {
        const currentMenu = slotsData[activeSlot];
        if (!currentMenu || (!currentMenu.name_th && !currentMenu.bgUrl)) {
          alert("⚠️ ไม่มีข้อมูลในช่องนี้ให้คัดลอกครับ");
          return;
        }

        if (
          confirm(
            `ต้องการคัดลอกข้อมูล การตั้งค่าฟอนต์ และพื้นหลังของช่องที่ ${activeSlot} ไปยังทุก Slot ใช่หรือไม่?`,
          )
        ) {
          const count = currentTemplateConfig.slots_count;
          for (let i = 1; i <= count; i++) {
            slotsData[i] = JSON.parse(JSON.stringify(currentMenu));
            const slotDiv = document.getElementById(`slot-${i}`);
            if (slotDiv) {
              const wrapper = slotDiv.querySelector("div:last-child");
              renderSlotContent(wrapper, slotsData[i], i);
            }
          }
        }
      }

      function applyBackgroundToAllSlots() {
        const select = document.getElementById("bgSelect");
        const bgUrl = select.value;

        if (confirm(`ต้องการใช้ภาพพื้นหลังนี้กับทุก Slot ใช่หรือไม่?`)) {
          const count = currentTemplateConfig.slots_count;
          for (let i = 1; i <= count; i++) {
            if (!slotsData[i]) slotsData[i] = {};
            slotsData[i].bgUrl = bgUrl;

            const slotDiv = document.getElementById(`slot-${i}`);
            if (slotDiv) {
              const wrapper = slotDiv.querySelector("div:last-child");
              renderSlotContent(wrapper, slotsData[i], i);
            }
          }
        }
      }

      async function searchMenu(query) {
        const results = document.getElementById("searchResults");
        if (query.length < 1) {
          results.classList.add("hidden");
          return;
        }
        try {
          const { data: menus, error } = await dbClient
            .from("menus")
            .select("*")
            .or(`name_th.ilike.%${query}%,name_en.ilike.%${query}%`)
            .limit(10);
          if (error) throw error;

          if (menus && menus.length > 0) {
            const { data: allIngs } = await dbClient
              .from("ingredients")
              .select("*");
            results.innerHTML = menus
              .map((m) => {
                const allergens = (m.ingredient_ids || [])
                  .map((id) =>
                    allIngs.find((ing) => String(ing.id) === String(id)),
                  )
                  .filter(Boolean);
                const completeMenu = { ...m, allergens: allergens };
                return `<div onclick='selectMenu(${JSON.stringify(completeMenu).replace(/'/g, "&#39;")})' class="p-3 hover:bg-emerald-50 cursor-pointer border-b last:border-0 transition-colors"><div class="font-bold text-sm text-slate-800">${m.name_th}</div><div class="text-xs text-slate-500">${m.name_en || ""}</div></div>`;
              })
              .join("");
            results.classList.remove("hidden");
          } else {
            results.innerHTML =
              '<div class="p-3 text-xs text-slate-400">ไม่พบข้อมูลเมนู</div>';
            results.classList.remove("hidden");
          }
        } catch (err) {
          console.error("Search Error:", err);
        }
      }

      function selectMenu(menu) {
        const currentSlotData = slotsData[activeSlot] || {};

        slotsData[activeSlot] = {
          ...menu,
          bgUrl: currentSlotData.bgUrl || "",
          fontTh: currentSlotData.fontTh || DEFAULT_FONT_TH,
          fontSizeTh: currentSlotData.fontSizeTh || DEFAULT_SIZE_TH,
          fontEn: currentSlotData.fontEn || DEFAULT_FONT_EN,
          fontSizeEn: currentSlotData.fontSizeEn || DEFAULT_SIZE_EN,
        };

        updateInputs(slotsData[activeSlot]);
        document.getElementById("searchResults").classList.add("hidden");
        renderActiveSlotOnly();
      }

      function changeBackgroundForCurrentSlot(bgUrl) {
        if (!slotsData[activeSlot]) slotsData[activeSlot] = {};
        slotsData[activeSlot].bgUrl = bgUrl;
        renderActiveSlotOnly();
      }

      async function loadBackgrounds(sizeName) {
        const select = document.getElementById("bgSelect");
        select.innerHTML = '<option value="">สีขาว</option>';

        try {
          const { data: bgs, error } = await dbClient
            .from("backgrounds")
            .select("*")
            .eq("template_size", sizeName);
          if (error) throw error;

          if (bgs && bgs.length > 0) {
            bgs.forEach((bg) => {
              select.innerHTML += `<option value="${bg.image_url}">${bg.name}</option>`;
            });
          }

          syncBgSelectWithCurrentSlot();
        } catch (err) {
          console.error("Error loading backgrounds:", err);
        }
      }

      function showSaveModal() {
        const profileNameInput = document
          .getElementById("profileName")
          .value.trim();
        if (!profileNameInput) {
          alert("⚠️ กรุณากรอกช่อง Title (ชื่อโปรไฟล์) ก่อนทำการบันทึก");
          document.getElementById("profileName").focus();
          return;
        }
        const modal = document.getElementById("saveModal");
        const content = document.getElementById("saveModalContent");
        content.innerHTML = `<div class="text-center"><div class="w-16 h-16 bg-emerald-50 text-[#006d4b] rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-emerald-100"><span class="material-symbols-outlined text-3xl">save</span></div><h3 class="text-xl font-bold text-slate-800 mb-2">ยืนยันการบันทึกโปรไฟล์</h3><p class="text-sm text-slate-500 mb-6 leading-relaxed">คุณต้องการบันทึกโปรไฟล์นี้<br>ในชื่อ <span class="font-black text-[#006d4b] text-base">"${profileNameInput}"</span> ใช่หรือไม่?</p><div class="flex gap-3 w-full"><button onclick="closeSaveModal()" class="flex-1 py-2.5 border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors">ยกเลิก</button><button onclick="confirmSave()" class="flex-1 py-2.5 bg-[#006d4b] text-white font-bold rounded-xl hover:bg-[#005a3d] shadow-md transition-colors flex justify-center items-center gap-2"><span class="material-symbols-outlined text-[18px]">check</span> ยืนยัน</button></div></div>`;
        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          content.classList.remove("scale-95");
        }, 10);
      }

      function closeSaveModal() {
        const modal = document.getElementById("saveModal");
        const content = document.getElementById("saveModalContent");
        modal.classList.add("opacity-0");
        content.classList.add("scale-95");
        setTimeout(() => {
          modal.classList.add("hidden");
        }, 300);
      }

      function confirmSave() {
        const content = document.getElementById("saveModalContent");
        content.innerHTML = `<div class="text-center py-6"><span class="material-symbols-outlined text-5xl text-[#006d4b] animate-spin mb-4">progress_activity</span><h3 class="text-lg font-bold text-slate-800">กำลังบันทึกข้อมูล...</h3><p class="text-xs text-slate-400 mt-2">กรุณารอสักครู่</p></div>`;
        setTimeout(() => {
          try {
            let savedTags = JSON.parse(localStorage.getItem("savedTags")) || [];
            const profileName = document
              .getElementById("profileName")
              .value.trim();
            const newTag = {
              title: profileName,
              templateName: currentTemplateConfig.name,
              createdAt: new Date().toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
                year: "numeric",
              }),
              slotsData: slotsData,
            };
            if (editId) {
              const idx = savedTags.findIndex((t) => t.id === editId);
              if (idx !== -1) {
                newTag.id = editId;
                savedTags[idx] = newTag;
              } else {
                newTag.id = Date.now().toString();
                savedTags.push(newTag);
              }
            } else {
              newTag.id = Date.now().toString();
              savedTags.push(newTag);
            }
            localStorage.setItem("savedTags", JSON.stringify(savedTags));
          } catch (error) {
            console.error("Error saving:", error);
          }
          content.innerHTML = `<div class="text-center py-4"><div class="w-16 h-16 bg-[#e6f4ea] text-[#006d4b] rounded-full flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-4xl">check_circle</span></div><h3 class="text-xl font-bold text-[#1e293b] mb-3">บันทึกเสร็จสิ้น!</h3><p class="text-sm text-[#475569] mb-6">ข้อมูลโปรไฟล์ถูกบันทึกเรียบร้อยแล้ว</p><button onclick="window.location.href='dashboard.html'" class="w-full py-2.5 bg-[#006d4b] text-white font-bold rounded-xl hover:bg-[#005a3d] shadow-sm transition-colors">ตกลง</button></div>`;
        }, 1500);
      }

      async function capturePaper() {
        document.body.style.cursor = "wait";
        const paper = document.getElementById("a4Paper");
        document
          .querySelectorAll(".hidden-on-export")
          .forEach((el) => (el.style.display = "none"));
        const activeSlotEl = document.querySelector(".slot.active");
        if (activeSlotEl) {
          activeSlotEl.style.outline = "none";
          activeSlotEl.style.backgroundColor = "white";
        }
        const originalTransform = paper.style.transform;
        paper.style.transform = "none";
        await new Promise((resolve) => setTimeout(resolve, 50));
        const canvas = await html2canvas(paper, {
          scale: 2,
          useCORS: true,
          allowTaint: false,
          backgroundColor: "#ffffff",
        });
        paper.style.transform = originalTransform;
        document
          .querySelectorAll(".hidden-on-export")
          .forEach((el) => (el.style.display = ""));
        if (activeSlotEl) {
          activeSlotEl.style.outline = "";
          activeSlotEl.style.backgroundColor = "";
        }
        document.body.style.cursor = "default";
        return canvas;
      }

      async function exportFile(type) {
        const canvas = await capturePaper();
        const fileName = `Food-Tag_${document.getElementById("profileName").value || "Export"}`;
        if (type === "pdf") {
          const { jsPDF } = window.jspdf;
          const orientation =
            currentTemplateConfig.orientation === "landscape" ? "l" : "p";
          const pdf = new jsPDF({
            orientation: orientation,
            unit: "mm",
            format: "a4",
          });
          const imgData = canvas.toDataURL("image/jpeg", 1.0);
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = pdf.internal.pageSize.getHeight();
          pdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
          pdf.save(`${fileName}.pdf`);
        } else {
          const link = document.createElement("a");
          link.download = `${fileName}.${type}`;
          link.href = canvas.toDataURL(
            `image/${type === "jpg" ? "jpeg" : "png"}`,
          );
          link.click();
        }
      }

      async function shareDirectly() {
        const canvas = await capturePaper();
        const fileName = `Food-Tag_${document.getElementById("profileName").value || "Export"}.png`;
        canvas.toBlob(async (blob) => {
          const file = new File([blob], fileName, { type: "image/png" });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({
                title: "IMPACT Food Tag",
                text: `Tag ป้ายอาหาร: ${document.getElementById("profileName").value || "ไม่ระบุชื่อ"}`,
                files: [file],
              });
            } catch (error) {
              console.log("Share failed:", error);
            }
          } else {
            alert("⚠️ Browser ไม่รองรับการแชร์ไฟล์ภาพโดยตรง");
          }
        }, "image/png");
      }

      function renderActiveSlotOnly() {
        const slotDiv = document.getElementById(`slot-${activeSlot}`);
        if (slotDiv) {
          const wrapper = slotDiv.querySelector("div:last-child");
          renderSlotContent(wrapper, slotsData[activeSlot], activeSlot);
        }
      }

      function changeFontTh(val) {
        if (!slotsData[activeSlot]) slotsData[activeSlot] = {};
        slotsData[activeSlot].fontTh = val;
        renderActiveSlotOnly();
      }
      function changeFontSizeTh(val) {
        if (!slotsData[activeSlot]) slotsData[activeSlot] = {};
        slotsData[activeSlot].fontSizeTh = val + "px";
        renderActiveSlotOnly();
      }
      function changeFontEn(val) {
        if (!slotsData[activeSlot]) slotsData[activeSlot] = {};
        slotsData[activeSlot].fontEn = val;
        renderActiveSlotOnly();
      }
      function changeFontSizeEn(val) {
        if (!slotsData[activeSlot]) slotsData[activeSlot] = {};
        slotsData[activeSlot].fontSizeEn = val + "px";
        renderActiveSlotOnly();
      }
    </script>
  </body>
</html>
