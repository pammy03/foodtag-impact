<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Database | IMPACT Food Tag</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }
      .modal-overlay.active {
        display: flex !important;
      }
      .ingredient-checkbox:checked + div {
        border-color: #006d4b;
        background-color: #f0fdf4;
        box-shadow: 0 4px 6px -1px rgba(0, 109, 75, 0.1);
      }
      .ingredient-checkbox:checked + div .check-icon {
        opacity: 1;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      tr.menu-row:hover {
        background-color: #f8fafc;
        transition: background-color 0.2s;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc] flex h-screen overflow-hidden">
    <div id="sidebar-container" class="shrink-0 h-full z-20"></div>

    <div
      class="flex-1 flex flex-col h-full overflow-hidden relative bg-[#f1f5f9]"
    >
      <header
        class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center z-20 shrink-0"
      >
        <div class="flex items-center gap-2">
          <h1
            class="text-[28px] font-black text-slate-800 tracking-tighter leading-none"
          >
            Menus
          </h1>
          <div
            id="totalMenuCount"
            class="ml-2 px-3 py-1 bg-emerald-50 text-[#006d4b] font-black text-[13px] rounded-lg tracking-wider hidden"
          >
            ...
          </div>
        </div>

        <div class="flex gap-3 items-center">
          <button
            type="button"
            onclick="openMenuModal()"
            class="px-5 py-2.5 bg-[#006d4b] text-white font-bold rounded-xl hover:bg-[#005a3d] transition-all flex items-center gap-2 shadow-sm shadow-[#006d4b]/20 cursor-pointer"
          >
            <span class="material-symbols-outlined text-[20px]">add</span>
            Add New Menu
          </button>

          <label
            class="px-5 py-2.5 bg-white border-2 border-[#006d4b] text-[#006d4b] font-bold rounded-xl hover:bg-[#f0fdf4] transition-all flex items-center gap-2 shadow-sm cursor-pointer ml-2"
          >
            <span class="material-symbols-outlined text-[20px]"
              >upload_file</span
            >
            Import Menus (Excel/CSV)
            <input
              type="file"
              id="csvFileInput"
              accept=".xlsx, .xls, .csv"
              class="hidden"
              onchange="importExcel(event)"
            />
          </label>
        </div>
      </header>

      <main class="flex-1 flex flex-col p-8 overflow-hidden z-10">
        <div
          class="bg-white p-5 rounded-t-2xl border border-slate-200 border-b-0 flex gap-4 items-center shrink-0"
        >
          <div class="w-full max-w-lg relative">
            <span
              class="material-symbols-outlined absolute left-4 top-3 text-slate-400 pointer-events-none"
              >search</span
            >
            <input
              type="text"
              id="searchInput"
              onkeyup="renderTable()"
              placeholder="ค้นหาชื่อเมนู หรือ Menu ID..."
              class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#006d4b] focus:bg-white transition-all shadow-sm text-sm"
            />
          </div>
          <div
            class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-auto"
          >
            Database Management
          </div>
        </div>

        <div
          class="bg-white border border-slate-200 rounded-b-2xl flex-1 overflow-auto shadow-xl shadow-slate-200/50 custom-scroll"
        >
          <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 sticky top-0 shadow-sm z-10">
              <tr>
                <th
                  class="py-4 px-8 text-[11px] font-black text-slate-400 uppercase tracking-widest w-32 border-b"
                >
                  Menu ID
                </th>
                <th
                  class="py-4 px-6 text-[11px] font-black text-slate-400 uppercase tracking-widest w-1/3 border-b"
                >
                  Menu Details
                </th>
                <th
                  class="py-4 px-6 text-[11px] font-black text-slate-400 uppercase tracking-widest border-b"
                >
                  Images / Ingredients
                </th>
                <th
                  class="py-4 px-8 text-[11px] font-black text-slate-400 uppercase tracking-widest w-32 border-b text-center"
                >
                  Manage
                </th>
              </tr>
            </thead>
            <tbody id="menuTableBody" class="divide-y divide-slate-100">
              <tr>
                <td colspan="4" class="py-20 text-center">
                  <div class="flex flex-col items-center opacity-30">
                    <span
                      class="material-symbols-outlined text-5xl animate-spin"
                      >progress_activity</span
                    >
                    <p class="mt-4 font-bold tracking-widest">
                      LOADING DATABASE...
                    </p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div id="menuModal" class="modal-overlay">
      <div
        class="bg-white rounded-3xl shadow-2xl w-[650px] max-h-[90vh] flex flex-col relative z-50 overflow-hidden"
      >
        <div
          class="px-8 py-6 border-b flex justify-between items-center bg-slate-50"
        >
          <div>
            <h2 id="menuModalTitle" class="text-xl font-bold text-slate-800">
              Add New Menu
            </h2>
            <p
              id="menuModalSubtitle"
              class="text-xs text-slate-500 font-medium"
            >
              เพิ่มข้อมูลเมนูใหม่ลงในระบบส่วนกลาง
            </p>
          </div>
          <button
            type="button"
            onclick="closeModal('menuModal')"
            class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-white hover:text-slate-600 rounded-full transition-all cursor-pointer"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div class="p-8 overflow-y-auto space-y-6 custom-scroll">
          <div>
            <label
              class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2"
              >Menu ID
              <span class="text-[9px] text-slate-400 font-normal lowercase"
                >(Auto Generated)</span
              ></label
            >
            <input
              type="text"
              id="inputMenuId"
              readonly
              class="w-full px-4 py-3 bg-slate-100 text-slate-500 border border-slate-200 rounded-xl outline-none font-bold cursor-not-allowed"
              placeholder="Generating..."
            />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2"
                >Thai Name</label
              >
              <input
                type="text"
                id="inputNameTh"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#006d4b] focus:bg-white transition-all"
                placeholder="ชื่อภาษาไทย"
              />
            </div>
            <div>
              <label
                class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2"
                >English Name</label
              >
              <input
                type="text"
                id="inputNameEn"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#006d4b] focus:bg-white transition-all"
                placeholder="English Name"
              />
            </div>
          </div>

          <div>
            <div class="flex justify-between items-end mb-3">
              <label
                class="block text-xs font-black text-slate-400 uppercase tracking-widest"
                >Select Images / Ingredients</label
              >
              <div class="relative w-1/2 max-w-[200px]">
                <span
                  class="material-symbols-outlined absolute left-3 top-2 text-slate-400 text-[18px] pointer-events-none"
                  >search</span
                >
                <input
                  type="text"
                  id="searchIngredientModal"
                  onkeyup="filterModalIngredients()"
                  placeholder="ค้นหารูปภาพ..."
                  class="w-full pl-9 pr-3 py-1.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-[#006d4b] text-xs transition-all shadow-sm"
                />
              </div>
            </div>
            <div id="ingredientChecklist"></div>
            <div
              id="noIngredientFoundMsg"
              class="hidden flex-col items-center justify-center py-8 text-slate-400 bg-slate-50 border border-slate-100 border-dashed rounded-2xl"
            >
              <span class="material-symbols-outlined text-4xl mb-2 opacity-50"
                >search_off</span
              >
              <p class="text-xs font-bold uppercase tracking-widest">
                Not Found
              </p>
              <p class="text-[10px] mt-1">ไม่พบรูปภาพที่ค้นหา</p>
            </div>
          </div>
        </div>

        <div class="p-6 bg-slate-50 border-t flex justify-end gap-3">
          <button
            type="button"
            onclick="closeModal('menuModal')"
            class="px-6 py-2.5 text-slate-500 font-bold hover:text-slate-700 transition-colors cursor-pointer"
          >
            Cancel
          </button>
          <button
            type="button"
            onclick="saveMenu()"
            id="saveMenuBtn"
            class="px-8 py-2.5 bg-[#006d4b] text-white font-bold rounded-xl hover:bg-[#005a3d] shadow-lg shadow-[#006d4b]/20 transition-all cursor-pointer"
          >
            Save Menu
          </button>
        </div>
      </div>
    </div>

    <script src="sidebar.js"></script>

    <script>
      const supabaseUrl = "https://nexvompdeubppbkvnwor.supabase.co";
      const supabaseKey = "sb_publishable_cMshOGrGdX829-KmtIxOWw_HeC04-aI";
      const dbClient = supabase.createClient(supabaseUrl, supabaseKey);

      let dbMenus = [];
      let dbIngredients = [];
      let editingMenuDbId = null;

      async function fetchData() {
        try {
          const { data: ingData } = await dbClient
            .from("ingredients")
            .select("*");
          dbIngredients = ingData || [];
          const { data: menuData } = await dbClient
            .from("menus")
            .select("*")
            .order("created_at", { ascending: false });
          dbMenus = menuData || [];

          // 🎯 อัปเดตตัวเลขจำนวนเมนูทั้งหมด
          const countEl = document.getElementById("totalMenuCount");
          if (dbMenus.length > 0) {
            countEl.innerText = `${dbMenus.length} รายการ`;
            countEl.classList.remove("hidden");
          } else {
            countEl.classList.add("hidden");
          }

          renderTable();
        } catch (e) {
          console.error(e);
          document.getElementById("menuTableBody").innerHTML =
            `<tr><td colspan="4" class="py-20 text-center text-red-500 font-bold bg-red-50 rounded-b-2xl">⚠️ CONNECTION ERROR</td></tr>`;
        }
      }

      window.onload = fetchData;

      function renderTable() {
        const tbody = document.getElementById("menuTableBody");
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        let html = "";

        const filtered = dbMenus.filter(
          (m) =>
            (m.menu_id || "").toLowerCase().includes(query) ||
            (m.name_th || "").includes(query),
        );

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="py-24 text-center"><span class="material-symbols-outlined text-6xl mb-4 text-slate-200">search_off</span><p class="text-slate-400 font-bold tracking-widest uppercase">No menus found</p></td></tr>`;
          return;
        }

        filtered.forEach((menu, index) => {
          const menuIngs = (menu.ingredient_ids || [])
            .map((id) => dbIngredients.find((i) => String(i.id) === String(id)))
            .filter(Boolean);

          const ingHtml = menuIngs
            .map((ing) => {
              return `
            <div class="inline-flex items-center gap-2 bg-white shadow-sm border border-slate-200 px-3 py-1.5 rounded-xl mr-2 mb-2 group transition-all hover:border-[#006d4b]/30">
                <img src="${ing.icon_url || ing.image_url}" class="w-6 h-6 object-cover rounded-md">
                <span class="text-[11px] font-black text-slate-600 tracking-wider">${ing.name_en || ing.name_th || "IMG"}</span>
            </div>`;
            })
            .join("");

          const displayId = menu.menu_id || "-";
          const menuDataStr = encodeURIComponent(JSON.stringify(menu));

          html += `
          <tr class="menu-row border-b border-slate-100 last:border-0">
            <td class="py-5 px-8">
                <div class="flex items-center gap-4">
                    <span class="text-slate-300 font-black text-lg w-6">${index + 1}</span>
                    <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-black tracking-widest border border-slate-200 whitespace-nowrap">${displayId}</span>
                </div>
            </td>
            <td class="py-5 px-6">
                <div class="font-extrabold text-slate-800 text-[16px]">${menu.name_th || "-"}</div>
                <div class="text-[13px] text-slate-400 italic font-medium mt-0.5">${menu.name_en || "-"}</div>
            </td>
            <td class="py-5 px-6"><div class="flex flex-wrap">${ingHtml || "<span class='text-slate-300 text-sm font-medium italic'>No images assigned</span>"}</div></td>
            <td class="py-5 px-8 text-center">
                <div class="flex items-center justify-center gap-2">
                    <button onclick="openMenuModal('${menuDataStr}')" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-[#006d4b] hover:bg-emerald-50 rounded-full transition-all cursor-pointer"><span class="material-symbols-outlined text-[20px]">edit_document</span></button>
                    <button onclick="deleteMenu('${menu.id}')" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all cursor-pointer"><span class="material-symbols-outlined text-[20px]">delete</span></button>
                </div>
            </td>
          </tr>`;
        });
        tbody.innerHTML = html;
      }

      function getLatestMenuNumber() {
        let maxNum = 0;
        dbMenus.forEach((menu) => {
          if (menu.menu_id && menu.menu_id.startsWith("MENU-")) {
            const num = parseInt(menu.menu_id.split("-")[1]);
            if (num > maxNum) maxNum = num;
          }
        });
        return maxNum;
      }

      function openMenuModal(menuDataStr = null) {
        document.getElementById("searchIngredientModal").value = "";
        const container = document.getElementById("ingredientChecklist");
        let selectedIds = [];

        if (menuDataStr) {
          const menu = JSON.parse(decodeURIComponent(menuDataStr));
          editingMenuDbId = menu.id;
          document.getElementById("menuModalTitle").innerText = "Edit Menu";
          document.getElementById("inputMenuId").value = menu.menu_id || "-";
          document.getElementById("inputNameTh").value = menu.name_th || "";
          document.getElementById("inputNameEn").value = menu.name_en || "";
          selectedIds = (menu.ingredient_ids || []).map(String);
        } else {
          editingMenuDbId = null;
          document.getElementById("menuModalTitle").innerText = "Add New Menu";
          document.getElementById("inputMenuId").value =
            `MENU-${(getLatestMenuNumber() + 1).toString().padStart(3, "0")}`;
          document.getElementById("inputNameTh").value = "";
          document.getElementById("inputNameEn").value = "";
        }

        container.innerHTML = dbIngredients
          .map((ing) => {
            const isChecked = selectedIds.includes(String(ing.id))
              ? "checked"
              : "";
            return `
            <label class="cursor-pointer relative block h-full ingredient-item" data-name="${(ing.name_th || "").toLowerCase()} ${(ing.name_en || "").toLowerCase()}">
              <input type="checkbox" class="ingredient-checkbox hidden" value="${ing.id}" ${isChecked}>
              <div class="border-2 border-slate-100 rounded-xl p-3 flex flex-col items-center gap-2 hover:bg-slate-50 transition-all select-none text-center bg-white h-full justify-between hover:border-[#006d4b]/30">
                <div class="w-14 h-14 flex items-center justify-center bg-slate-50 rounded-lg p-1 border border-slate-100 mb-1">
                    <img src="${ing.icon_url || ing.image_url}" class="w-full h-full object-cover rounded-md">
                </div>
                <span class="text-[10px] font-black text-slate-600 tracking-widest w-full truncate">${ing.name_en || ing.name_th || "ไม่มีชื่อ"}</span>
                <span class="text-[9px] font-bold text-slate-400 w-full truncate">${ing.name_th || ""}</span>
                <span class="material-symbols-outlined text-[#006d4b] opacity-0 check-icon absolute top-2 right-2 text-[18px]">check_circle</span>
              </div>
            </label>`;
          })
          .join("");

        container.className =
          "grid grid-cols-3 gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 max-h-64 overflow-y-auto custom-scroll";
        document.getElementById("menuModal").classList.add("active");
      }

      function filterModalIngredients() {
        const searchVal = document
          .getElementById("searchIngredientModal")
          .value.toLowerCase();
        document.querySelectorAll(".ingredient-item").forEach((item) => {
          item.style.display = item
            .getAttribute("data-name")
            .includes(searchVal)
            ? "block"
            : "none";
        });
      }

      function closeModal(id) {
        document.getElementById(id).classList.remove("active");
      }

      async function saveMenu() {
        const id = document.getElementById("inputMenuId").value.trim();
        const th = document.getElementById("inputNameTh").value.trim();
        const en = document.getElementById("inputNameEn").value.trim();
        const selected = Array.from(
          document.querySelectorAll(".ingredient-checkbox:checked"),
        ).map((cb) => parseInt(cb.value));

        const payload = {
          menu_id: id,
          name_th: th,
          name_en: en,
          ingredient_ids: selected,
        };
        const btn = document.getElementById("saveMenuBtn");
        btn.disabled = true;

        try {
          if (editingMenuDbId)
            await dbClient
              .from("menus")
              .update(payload)
              .eq("id", editingMenuDbId);
          else await dbClient.from("menus").insert([payload]);
          closeModal("menuModal");
          fetchData();
        } catch (e) {
          alert(e.message);
        } finally {
          btn.disabled = false;
        }
      }

      async function deleteMenu(dbId) {
        if (confirm("ต้องการลบเมนูนี้?")) {
          await dbClient.from("menus").delete().eq("id", dbId);
          fetchData();
        }
      }

      async function importExcel(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });
          const jsonData = XLSX.utils.sheet_to_json(
            workbook.Sheets[workbook.SheetNames[0]],
          );
          let currentMaxId = getLatestMenuNumber();

          const ingDict = dbIngredients.map((ing) => ({
            id: ing.id,
            nameTh: (ing.name_th || "").toLowerCase().replace(/\s+/g, ""),
            nameEn: (ing.name_en || "").toLowerCase().replace(/\s+/g, ""),
          }));

          for (const row of jsonData) {
            const nameTh = row["Thai Name"] || "";
            const nameEn = row["English Name"] || "";
            const rawIngs = row["Ingredients"] || "";
            currentMaxId++;
            let ingredientIds = [];
            if (rawIngs) {
              String(rawIngs)
                .split(",")
                .map((n) => n.trim().toLowerCase().replace(/\s+/g, ""))
                .forEach((name) => {
                  const found = ingDict.find(
                    (i) => i.nameTh === name || i.nameEn === name,
                  );
                  if (found) ingredientIds.push(found.id);
                });
            }
            await dbClient.from("menus").insert({
              menu_id: `MENU-${currentMaxId.toString().padStart(3, "0")}`,
              name_th: nameTh,
              name_en: nameEn,
              ingredient_ids: ingredientIds,
            });
          }
          fetchData();
          event.target.value = "";
        };
        reader.readAsArrayBuffer(file);
      }
    </script>
  </body>
</html>
