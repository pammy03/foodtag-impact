<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Tags | IMPACT Food Tag</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", "Sarabun", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .modal-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .view-mode-active {
        background-color: white;
        color: #006d4b;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        border-color: #e2e8f0;
      }

      /* ==========================================
         GRID VIEW MODE
      ========================================== */
      .card-grid-mode {
        display: grid;
        grid-template-columns: repeat(1, 1fr);
        gap: 1.5rem;
      }
      @media (min-width: 768px) {
        .card-grid-mode {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1280px) {
        .card-grid-mode {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (min-width: 1536px) {
        .card-grid-mode {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      /* ==========================================
         LIST VIEW MODE
      ========================================== */
      .card-list-mode {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .card-list-mode .profile-card {
        flex-direction: row;
        height: auto;
        min-height: 80px;
        align-items: center;
        padding: 0.75rem 1.25rem 0.75rem 0.75rem;
        border-radius: 1rem;
      }

      .card-list-mode .card-preview-container {
        width: 110px;
        height: 70px;
        margin: 0;
        border-radius: 8px;
        flex-shrink: 0;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        position: relative;
        overflow: hidden;
      }

      .card-list-mode .card-order-badge {
        top: 4px;
        left: 4px;
        width: 20px;
        height: 20px;
        font-size: 9px;
        border-radius: 4px;
      }

      .card-list-mode .p-5 {
        padding: 0 0 0 1.25rem;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        flex: 1;
        width: calc(100% - 110px);
      }

      .card-list-mode .list-info-left {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        margin: 0;
        max-width: 60%;
      }
      .card-list-mode .list-info-left h3 {
        font-size: 16px;
        margin-bottom: 4px;
      }

      .card-list-mode .list-meta-center {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 0;
        padding: 0;
        border: none;
      }

      .card-list-mode .list-actions-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0;
      }
      .card-list-mode .list-actions-right .print-btn {
        height: 38px;
        padding: 0 1rem;
        font-size: 13px;
      }
      .card-list-mode .list-actions-right .action-icon-btn {
        width: 38px;
        height: 38px;
      }

      /* ==========================================
         COMMON STYLES
      ========================================== */
      .preview-paper {
        background: white;
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(0, 0, 0, 0.04);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        transform-origin: top center;
        flex-shrink: 0;
      }
      .inner-grid {
        display: grid;
        width: 100%;
        height: 100%;
        flex-grow: 1;
        border-top: 1px dashed #cbd5e1;
        border-left: 1px dashed #cbd5e1;
        background-color: white;
      }
      .grid-plate {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(1, 1fr);
      }
      .grid-western {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }
      .grid-buffet {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }

      .slot {
        border-right: 1px dashed #cbd5e1;
        border-bottom: 1px dashed #cbd5e1;
        box-sizing: border-box;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: white;
        overflow: hidden;
      }
      .slot-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 0;
      }

      .allergen-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
      }
      .allergen-icon {
        width: calc((100% - 32px) / 5);
        max-width: 85px;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        display: block;
        background: transparent;
      }

      .card-preview-container {
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }
      .scaled-preview {
        transform-origin: center center;
        pointer-events: none;
      }

      .card-order-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 30px;
        height: 30px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(4px);
        color: white;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .sort-btn {
        transition: all 0.2s;
      }
      .sort-btn.active {
        background: #006d4b;
        color: white;
        border-color: #006d4b;
      }
      .sort-btn:not(.active) {
        background: white;
        color: #64748b;
        border-color: #e2e8f0;
      }
      .sort-btn:not(.active):hover {
        background: #f8fafc;
        color: #334155;
      }

      @media print {
        @page {
          size: landscape;
          margin: 0mm;
        }
        body > *:not(#printArea) {
          display: none !important;
        }
        html,
        body {
          margin: 0 !important;
          padding: 0 !important;
          background: white;
          width: 100% !important;
          height: 100% !important;
          display: flex !important;
          justify-content: center !important;
          align-items: center !important;
          overflow: hidden !important;
        }
        #printArea {
          display: flex !important;
          justify-content: center !important;
          align-items: center !important;
          width: 100% !important;
          height: 100% !important;
          padding: 0 !important;
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          background: white !important;
        }
        .preview-paper {
          box-shadow: none !important;
          margin: auto !important;
          width: 100% !important;
          height: 100% !important;
          padding: 5mm !important;
          page-break-after: avoid;
          box-sizing: border-box !important;
          transform: scale(0.96) !important;
          transform-origin: center center !important;
          border: none !important;
        }
        .allergen-icon {
          width: calc((100% - 16px) / 5) !important;
          max-width: 105px !important;
          aspect-ratio: 1 / 1 !important;
          height: auto !important;
          background: transparent !important;
          border: none !important;
          box-shadow: none !important;
          padding: 0 !important;
        }
        #previewModal {
          display: none !important;
        }
      }
    </style>
  </head>

    <script>
      const TEMPLATE_CONFIGS = {
        "Plate / Food Stall": {
          orientation: "landscape",
          slots_count: 2,
          grid_class: "grid-plate",
          hide_allergies: false,
          w: 1123,
          h: 794,
        },
        "Western Set": {
          orientation: "landscape",
          slots_count: 4,
          grid_class: "grid-western",
          hide_allergies: false,
          w: 1123,
          h: 794,
        },
        "Buffet / Coffee Break": {
          orientation: "landscape",
          slots_count: 6,
          grid_class: "grid-buffet",
          hide_allergies: false,
          w: 1123,
          h: 794,
        },
      };

      let allTags = [];
      let filteredTags = [];
      let profileToDeleteId = null;
      let currentSortOrder = "newest";
      let currentViewMode = "grid";
      let currentPage = 1;
      const itemsPerPage = 8;

      function getPaperDimensions(templateName, paperSize) {
        const config = TEMPLATE_CONFIGS[templateName];
        if (!config) return { w: 1123, h: 794 };
        if (paperSize === "A3") return { w: 1587, h: 1123 };
        return { w: 1123, h: 794 };
      }

      function getSavedTags() {
        return JSON.parse(localStorage.getItem("savedTags")) || [];
      }

      function changeView(mode) {
        currentViewMode = mode;
        const grid = document.getElementById("cardGrid");
        const btnList = document.getElementById("btn-list-view");
        const btnGrid = document.getElementById("btn-grid-view");

        if (mode === "list") {
          grid.className = "card-list-mode transition-all duration-300";
          btnList.classList.add(
            "view-mode-active",
            "bg-white",
            "shadow-sm",
            "border-slate-200",
            "text-[#006d4b]",
          );
          btnList.classList.remove("text-slate-400", "border-transparent");
          btnGrid.classList.remove(
            "view-mode-active",
            "bg-white",
            "shadow-sm",
            "border-slate-200",
            "text-[#006d4b]",
          );
          btnGrid.classList.add("text-slate-400", "border-transparent");
        } else {
          grid.className = "card-grid-mode transition-all duration-300";
          btnGrid.classList.add(
            "view-mode-active",
            "bg-white",
            "shadow-sm",
            "border-slate-200",
            "text-[#006d4b]",
          );
          btnGrid.classList.remove("text-slate-400", "border-transparent");
          btnList.classList.remove(
            "view-mode-active",
            "bg-white",
            "shadow-sm",
            "border-slate-200",
            "text-[#006d4b]",
          );
          btnList.classList.add("text-slate-400", "border-transparent");
        }
        renderCurrentPage();
      }

      function setSortOrder(order) {
        currentSortOrder = order;
        document
          .getElementById("sortNewest")
          .classList.toggle("active", order === "newest");
        document
          .getElementById("sortOldest")
          .classList.toggle("active", order === "oldest");
        applyFiltersAndRender(true);
      }

      function updateResultsBar(visibleCount, totalCount) {
        document.getElementById("visibleCount").textContent = visibleCount;
        const rangeEl = document.getElementById("resultsRangeText");

        if (visibleCount === 0) {
          rangeEl.innerHTML = `Total <span class="font-bold text-slate-800">0</span> profiles`;
          return;
        }

        const start = (currentPage - 1) * itemsPerPage + 1;
        const end = Math.min(currentPage * itemsPerPage, visibleCount);
        rangeEl.innerHTML = `Showing <span class="font-bold text-slate-800">${start}-${end}</span> of <span class="font-bold text-slate-800">${visibleCount}</span> profiles`;
      }

      function loadSavedTags() {
        const saved = getSavedTags();
        allTags = saved.map((tag, index) => {
          return {
            ...tag,
            originalOrder: index + 1,
            createdAt: tag.createdAt || new Date(0).toISOString(),
          };
        });
        document.getElementById("profileCount").innerText =
          `${allTags.length} รายการ`;
        applyFiltersAndRender(true);
      }

      function clearFilters() {
        document.getElementById("searchInput").value = "";
        document.getElementById("sizeFilter").value = "all";
        document.getElementById("paperSizeFilter").value = "all";
        document.getElementById("creatorFilter").value = "all";
        document.getElementById("dateStart").value = "";
        document.getElementById("dateEnd").value = "";
        applyFiltersAndRender(true);
      }

      function applyFiltersAndRender(resetPage = false) {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const size = document.getElementById("sizeFilter").value;
        const pSize = document.getElementById("paperSizeFilter").value;
        const creator = document
          .getElementById("creatorFilter")
          .value.toLowerCase();
        const start = document.getElementById("dateStart").value
          ? new Date(document.getElementById("dateStart").value).setHours(
              0,
              0,
              0,
              0,
            )
          : null;
        const end = document.getElementById("dateEnd").value
          ? new Date(document.getElementById("dateEnd").value).setHours(
              23,
              59,
              59,
              999,
            )
          : null;

        filteredTags = allTags.filter((tag) => {
          const name = tag.title.toLowerCase();
          const tCreator = (tag.createdBy || "UNKNOWN").toLowerCase();
          const tDate = new Date(tag.createdAt).getTime();

          let match =
            name.includes(q) &&
            (size === "all" || tag.templateName === size) &&
            (pSize === "all" || (tag.paperSize || "A4") === pSize) &&
            (creator === "all" || tCreator === creator);
          if (start && tDate < start) match = false;
          if (end && tDate > end) match = false;
          return match;
        });

        filteredTags.sort((a, b) => {
          const da = a.createdAt ? new Date(a.createdAt).getTime() : NaN;
          const db = b.createdAt ? new Date(b.createdAt).getTime() : NaN;

          const validA = !isNaN(da);
          const validB = !isNaN(db);

          if (validA && validB && da !== db) {
            return currentSortOrder === "newest" ? db - da : da - db;
          }

          return currentSortOrder === "newest"
            ? b.originalOrder - a.originalOrder
            : a.originalOrder - b.originalOrder;
        });

        if (resetPage) currentPage = 1;
        renderCurrentPage();
      }

      function renderCurrentPage() {
        const cardGrid = document.getElementById("cardGrid");
        const userData = JSON.parse(localStorage.getItem("userData"));
        const isStaff = userData && userData.role === "Staff";
        const isListView = currentViewMode === "list";

        cardGrid.innerHTML = "";

        if (filteredTags.length === 0) {
          cardGrid.innerHTML = `
            <div class="col-span-full py-24 flex flex-col items-center justify-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
              <span class="material-symbols-outlined text-[48px] mb-3 opacity-50">inventory_2</span>
              <p class="text-lg font-medium">No Profiles Found</p>
              <p class="text-sm mt-1">Try adjusting your filters or create a new tag.</p>
            </div>`;
          updateResultsBar(0, allTags.length);
          document.getElementById("paginationContainer").innerHTML = "";
          return;
        }

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageTags = filteredTags.slice(startIndex, endIndex);

        pageTags.forEach((tag, idx) => {
          const displayOrder = startIndex + idx + 1;
          const dims = getPaperDimensions(tag.templateName, tag.paperSize);
          const creatorName = tag.createdBy || "UNKNOWN";

          const dateObj = new Date(tag.createdAt);
          const formattedDate = isNaN(dateObj)
            ? tag.createdAt
            : dateObj
                .toLocaleDateString("en-US", {
                  month: "short",
                  day: "numeric",
                  year: "numeric",
                })
                .toUpperCase();

          if (isListView) {
            const manageButtons = isStaff
              ? ""
              : `
                <button onclick="window.location.href='create.html?edit=${tag.id}&id=${tag.id}'" title="Edit" class="action-icon-btn flex-shrink-0 flex justify-center items-center rounded-xl bg-slate-50 text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors border border-slate-100"><span class="material-symbols-outlined text-[18px]">edit</span></button>
                <button onclick="confirmDelete('${tag.id}')" title="Delete" class="action-icon-btn flex-shrink-0 flex justify-center items-center rounded-xl bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors border border-slate-100"><span class="material-symbols-outlined text-[18px]">delete_outline</span></button>
              `;

            const cardHTML = `
              <div class="group bg-white border border-slate-200 overflow-hidden hover:shadow-xl hover:shadow-slate-200/50 hover:border-slate-300 transition-all duration-300 flex relative profile-card"
                   data-name="${tag.title}" data-size="${tag.templateName}" data-papersize="${tag.paperSize || "A4"}" data-creator="${creatorName}" data-date="${tag.createdAt}">
                
                <div onclick="openPreviewModal('${tag.id}')" class="card-preview-container bg-slate-50 cursor-pointer relative rounded-lg">
                  <div class="absolute inset-0 bg-slate-900/5 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-center justify-center backdrop-blur-[1px]">
                    <span class="bg-white/95 text-slate-800 px-3 py-1 rounded-full font-bold text-[10px] shadow-lg flex items-center gap-1 transform translate-y-1 group-hover:translate-y-0 transition-all duration-300"><span class="material-symbols-outlined text-[14px]">visibility</span> Preview</span>
                  </div>
                  <div class="card-order-badge">#${displayOrder}</div>
                  <div class="scaled-preview" id="mini-preview-${tag.id}"></div>
                </div>
                
                <div class="p-5 flex flex-col flex-1 justify-center">
                  <div class="list-info-left flex justify-between items-start gap-3 w-full mb-1">
                    <div class="flex items-center gap-2.5 w-full">
                      <h3 class="font-bold text-[17px] text-slate-800 leading-snug line-clamp-1" title="${tag.title}">${tag.title}</h3>
                      <span class="shrink-0 bg-blue-50 text-blue-600 text-[11px] font-bold px-2 py-0.5 rounded border border-blue-100">${tag.paperSize || "A4"}</span>
                    </div>
                  </div>
                  
                  <div class="list-meta-center flex items-center gap-4 w-full">
                    <div class="flex items-center gap-1 text-[12px] font-medium text-slate-400" title="Template Size"><span class="material-symbols-outlined text-[16px]">straighten</span>${tag.templateName}</div>
                    <span class="w-1 h-1 rounded-full bg-slate-200 hidden sm:block"></span>
                    <div class="flex items-center gap-1 text-[12px] font-medium text-slate-400" title="Created on"><span class="material-symbols-outlined text-[16px]">calendar_today</span>${formattedDate}</div>
                    <span class="w-1 h-1 rounded-full bg-slate-200 hidden sm:block"></span>
                    <div class="flex items-center gap-1 text-[12px] font-semibold text-emerald-600 uppercase" title="Creator"><span class="material-symbols-outlined text-[16px]">person</span>${creatorName}</div>
                  </div>
                </div>
                
                <div class="list-actions-right flex items-center gap-2 ml-auto shrink-0">
                  ${manageButtons}
                  <button onclick="executePrint('${tag.id}')" class="print-btn flex justify-center items-center gap-2 rounded-xl bg-slate-800 hover:bg-black text-white font-semibold transition-colors shadow-sm active:scale-95 text-sm"><span class="material-symbols-outlined text-[18px]">print</span> Print</button>
                </div>
              </div>`;

            cardGrid.insertAdjacentHTML("beforeend", cardHTML);

            const miniPreview = document.getElementById(
              `mini-preview-${tag.id}`,
            );
            miniPreview.innerHTML = generatePaperHTML(tag);
            const scale = Math.min(110 / dims.w, 70 / dims.h);
            miniPreview.style.transform = `scale(${scale})`;
          } else {
            const manageButtons = isStaff
              ? ""
              : `
                <button onclick="window.location.href='create.html?edit=${tag.id}&id=${tag.id}'" title="Edit" class="w-11 h-11 flex-shrink-0 flex justify-center items-center rounded-xl bg-slate-50 text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors border border-slate-100"><span class="material-symbols-outlined text-[20px]">edit</span></button>
                <button onclick="confirmDelete('${tag.id}')" title="Delete" class="w-11 h-11 flex-shrink-0 flex justify-center items-center rounded-xl bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors border border-slate-100"><span class="material-symbols-outlined text-[20px]">delete_outline</span></button>
              `;

            const cardHTML = `
              <div class="group bg-white rounded-3xl border border-slate-200 overflow-hidden hover:shadow-xl hover:shadow-slate-200/50 hover:border-slate-300 transition-all duration-300 flex flex-col relative profile-card"
                   data-name="${tag.title}" data-size="${tag.templateName}" data-papersize="${tag.paperSize || "A4"}" data-creator="${creatorName}" data-date="${tag.createdAt}">
                
                <div onclick="openPreviewModal('${tag.id}')" class="card-preview-container h-48 bg-slate-50 border-b border-slate-100 cursor-pointer relative mt-4 mx-4 rounded-2xl flex justify-center items-center overflow-hidden">
                  <div class="absolute inset-0 bg-slate-900/5 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-center justify-center backdrop-blur-[1px] rounded-2xl">
                    <span class="bg-white/95 text-slate-800 px-4 py-2 rounded-full font-bold text-xs shadow-lg flex items-center gap-1.5 transform translate-y-2 group-hover:translate-y-0 transition-all duration-300"><span class="material-symbols-outlined text-[16px]">visibility</span> Preview</span>
                  </div>
                  <div class="card-order-badge">#${displayOrder}</div>
                  <div class="scaled-preview" id="mini-preview-${tag.id}"></div>
                </div>
                
                <div class="p-5 flex flex-col flex-1">
                  <div class="flex justify-between items-start gap-3 mb-2">
                    <h3 class="font-bold text-[17px] text-slate-800 leading-snug line-clamp-1 flex-1" title="${tag.title}">${tag.title}</h3>
                    <span class="shrink-0 bg-blue-50 text-blue-600 text-[11px] font-bold px-2 py-1 rounded border border-blue-100">${tag.paperSize || "A4"}</span>
                  </div>
                  
                  <div class="flex items-center gap-1.5 text-slate-500 text-sm mb-4 font-medium"><span class="material-symbols-outlined text-[18px]">straighten</span><span>${tag.templateName}</span></div>
                  
                  <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-100">
                    <div class="flex items-center gap-1 text-[12px] font-medium text-slate-400" title="Created on"><span class="material-symbols-outlined text-[16px]">calendar_today</span>${formattedDate}</div>
                    <div class="flex items-center gap-1 text-[12px] font-semibold text-emerald-600 uppercase" title="Creator"><span class="material-symbols-outlined text-[16px]">person</span>${creatorName}</div>
                  </div>
                  
                  <div class="flex items-center gap-2 mt-4">
                    ${manageButtons}
                    <button onclick="executePrint('${tag.id}')" class="flex-1 h-11 flex justify-center items-center gap-2 rounded-xl bg-slate-800 hover:bg-black text-white font-semibold transition-colors shadow-sm active:scale-95 text-sm"><span class="material-symbols-outlined text-[18px]">print</span> Print</button>
                  </div>
                </div>
              </div>`;

            cardGrid.insertAdjacentHTML("beforeend", cardHTML);

            const miniPreview = document.getElementById(
              `mini-preview-${tag.id}`,
            );
            miniPreview.innerHTML = generatePaperHTML(tag);
            const scale = Math.min(260 / dims.w, 150 / dims.h);
            miniPreview.style.transform = `scale(${scale})`;
          }
        });

        updateResultsBar(filteredTags.length, allTags.length);
        renderPagination(filteredTags.length);
      }

      function changePage(page) {
        currentPage = page;
        renderCurrentPage();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function renderPagination(totalItems) {
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        const container = document.getElementById("paginationContainer");

        if (totalPages <= 1) {
          container.innerHTML = "";
          return;
        }

        let html = `<div class="flex items-center gap-1.5 text-[13px] font-bold text-slate-500 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm">`;

        html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled class="p-1 opacity-30 cursor-not-allowed flex items-center"' : 'class="p-1 hover:bg-slate-100 hover:text-slate-800 rounded-full transition-colors flex items-center"'}><span class="material-symbols-outlined text-[20px]">chevron_left</span></button>`;

        let pages = [];
        for (let i = 1; i <= totalPages; i++) {
          if (
            i === 1 ||
            i === totalPages ||
            i === currentPage ||
            i === currentPage - 1 ||
            i === currentPage + 1
          ) {
            pages.push(i);
          }
        }

        let prev = 0;
        for (let p of pages) {
          if (prev && p - prev > 1)
            html += `<span class="w-8 h-8 flex items-center justify-center text-slate-400">...</span>`;
          if (p === currentPage)
            html += `<button class="w-8 h-8 bg-[#006d4b] text-white rounded-full shadow-md flex items-center justify-center transition-all mx-1">${p}</button>`;
          else
            html += `<button onclick="changePage(${p})" class="w-8 h-8 hover:bg-slate-100 hover:text-slate-800 rounded-full flex items-center justify-center transition-all">${p}</button>`;
          prev = p;
        }

        html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled class="p-1 opacity-30 cursor-not-allowed flex items-center"' : 'class="p-1 hover:bg-slate-100 hover:text-slate-800 rounded-full transition-colors flex items-center"'}><span class="material-symbols-outlined text-[20px]">chevron_right</span></button>`;
        html += `</div>`;
        container.innerHTML = html;
      }

      function generatePaperHTML(tagData) {
        const config = TEMPLATE_CONFIGS[tagData.templateName];
        if (!config) return "";

        let slotsHTML = "";
        const slotsData = tagData.slotsData || {};
        const dims = getPaperDimensions(
          tagData.templateName,
          tagData.paperSize,
        );

        for (let i = 1; i <= config.slots_count; i++) {
          const menu = slotsData[i] || {};
          const slotBgUrl = menu.bgUrl || "";
          const bgHtml = slotBgUrl
            ? `<img src="${slotBgUrl}" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 0;">`
            : "";

          if (!menu.name_th && !menu.name_en) {
            slotsHTML += `<div class="slot">${bgHtml}<div class="w-full h-full flex flex-col items-center justify-center relative z-10 p-6"><div class="slot-content"></div></div></div>`;
            continue;
          }

          const fTh = menu.fontTh || "'Sarabun', sans-serif";
          const sTh = menu.fontSizeTh || "22px";
          const fEn = menu.fontEn || "'Inter', sans-serif";
          const sEn = menu.fontSizeEn || "22px";

          let allergensHtml = "";
          if (
            !config.hide_allergies &&
            menu.allergens &&
            Array.isArray(menu.allergens) &&
            menu.allergens.length > 0
          ) {
            const iconsHtml = menu.allergens
              .map((a) => {
                if (!a || typeof a !== "object") return "";

                const imgUrl =
                  a.icon_url ||
                  a.image_url ||
                  a.url ||
                  a.image ||
                  "https://placehold.co/100x100/e2e8f0/94a3b8?text=No+Image";

                const nameText = a.name_th || a.name_en || "";

                return `<img src="${imgUrl}" style="width: calc((100% - 32px) / 5); max-width: 85px; aspect-ratio: 1/1; object-fit: contain; display: block; background: transparent;" title="${nameText}" crossorigin="anonymous" onerror="this.style.display='none'">`;
              })
              .join("");

            if (iconsHtml.trim() !== "") {
              allergensHtml = `<div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; margin-top: 15px; width: 100%; padding: 0 16px; box-sizing: border-box;">${iconsHtml}</div>`;
            }
          }

          // 🎯 [จุดที่แก้ไข] เอาโลโก้ IMPACT ออกไปจากบนหัวป้ายเรียบร้อยแล้ว
          slotsHTML += `
            <div class="slot" style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: white; border-right: 1px dashed #cbd5e1; border-bottom: 1px dashed #cbd5e1; text-align: center; overflow: hidden;">
                ${bgHtml}
                <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 24px;">
                    <div style="font-family: ${fTh}; font-size: ${sTh}; font-weight: 900; color: #1e293b; margin-bottom: 8px; line-height: 1.25; text-align: center; white-space: pre-line;">${menu.name_th || ""}</div>
                    <div style="font-family: ${fEn}; font-size: ${sEn}; font-weight: 500; color: #64748b; margin-bottom: 16px; line-height: 1.25; text-align: center; white-space: pre-line;">${menu.name_en || ""}</div>
                    ${allergensHtml}
                </div>
            </div>`;
        }

        return `<div class="preview-paper" style="width: ${dims.w}px; height: ${dims.h}px; background: white; padding: 0; box-sizing: border-box; display: flex; flex-direction: column;"><div class="inner-grid ${config.grid_class}" style="display: grid; width: 100%; height: 100%; flex-grow: 1; border-top: 1px dashed #cbd5e1; border-left: 1px dashed #cbd5e1; background-color: white;">${slotsHTML}</div></div>`;
      }

      function openPreviewModal(tagId) {
        const tag = getSavedTags().find((t) => t.id === tagId);
        if (!tag) return;
        const modal = document.getElementById("previewModal");
        modal.classList.remove("hidden");
        document.getElementById("modalTitle").innerText = tag.title;
        document.getElementById("modalSubtitle").innerText = tag.templateName;
        document.getElementById("modalPaperSizeBadge").innerText =
          tag.paperSize || "A4";

        const wrapper = document.getElementById("modalPaperWrapper");
        wrapper.innerHTML = generatePaperHTML(tag);
        const dims = getPaperDimensions(tag.templateName, tag.paperSize);

        setTimeout(() => {
          const modalBody = document.getElementById("modalBody");
          const scale = Math.min(
            (modalBody.clientWidth - 64) / dims.w,
            (modalBody.clientHeight - 64) / dims.h,
          );
          const paper = wrapper.querySelector(".preview-paper");
          paper.style.transform = `scale(${scale})`;
          wrapper.style.width = dims.w * scale + "px";
          wrapper.style.height = dims.h * scale + "px";

          modal.classList.add("opacity-100");
          document
            .getElementById("previewModalContent")
            .classList.remove("scale-95");
        }, 50);

        document.getElementById("modalPrintBtn").onclick = () =>
          executePrint(tagId);
      }

      function closePreviewModal() {
        document.getElementById("previewModal").classList.remove("opacity-100");
        document
          .getElementById("previewModalContent")
          .classList.add("scale-95");
        setTimeout(
          () => document.getElementById("previewModal").classList.add("hidden"),
          300,
        );
      }

      function confirmDelete(tagId) {
        profileToDeleteId = tagId;
        const modal = document.getElementById("deleteModal");
        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.add("opacity-100");
          document
            .getElementById("deleteModalContent")
            .classList.remove("scale-95");
        }, 10);
      }

      function closeDeleteModal() {
        const modal = document.getElementById("deleteModal");
        modal.classList.remove("opacity-100");
        document.getElementById("deleteModalContent").classList.add("scale-95");
        setTimeout(() => {
          modal.classList.add("hidden");
          profileToDeleteId = null;
        }, 300);
      }

      function executeDelete() {
        if (!profileToDeleteId) return;
        let savedTags = getSavedTags();
        const tag = savedTags.find((t) => t.id === profileToDeleteId);
        if (tag)
          logSystemActivity("DELETE", `ลบโปรไฟล์ป้ายอาหาร: ${tag.title}`);

        savedTags = savedTags.filter((tag) => tag.id !== profileToDeleteId);
        localStorage.setItem("savedTags", JSON.stringify(savedTags));
        closeDeleteModal();

        allTags = savedTags.map((t, index) => {
          return {
            ...t,
            originalOrder: index + 1,
            createdAt: t.createdAt || new Date(0).toISOString(),
          };
        });
        document.getElementById("profileCount").innerText =
          `${allTags.length} รายการ`;
        applyFiltersAndRender(false);
      }

      let printWindowOpenedAt = 0;
      let currentPrintTag = null;

      function executePrint(tagId) {
        const tag = getSavedTags().find((t) => t.id === tagId);
        if (!tag) return;
        
        // เก็บข้อมูล Tag ปัจจุบันไว้ แต่ยังไม่ Log จนกว่าหน้าต่าง Print จะปิดลง
        currentPrintTag = tag;
        
        const paperSize = tag.paperSize || "A4";
        const printArea = document.getElementById("printArea");
        printArea.innerHTML = generatePaperHTML(tag);

        let style = document.getElementById("printPageOrientation");
        if (!style) {
          style = document.createElement("style");
          style.id = "printPageOrientation";
          document.head.appendChild(style);
        }
        style.innerHTML = `@page { size: ${paperSize} landscape; margin: 0mm; } body { margin: 0; }`;

        printArea.classList.remove("hidden");
        setTimeout(() => {
          printWindowOpenedAt = Date.now();
          window.print();
          printArea.classList.add("hidden");
        }, 500);
      }

      window.addEventListener("afterprint", async () => {
        if (!printWindowOpenedAt || !currentPrintTag) return;

        const timeSpent = Date.now() - printWindowOpenedAt;
        printWindowOpenedAt = 0;

        if (timeSpent > 3000) {
          try {
            await logSystemActivity("PRINT", `สั่งพิมพ์ป้ายอาหาร Profile: ${currentPrintTag.title}`);
          } catch (err) {
            console.error("Audit log dispatch failed:", err);
          }
        }
        currentPrintTag = null;
      });

      loadSavedTags();
    </script>
  </body>
</html>
