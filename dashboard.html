<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | IMPACT Food Tag</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", "Sarabun", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .modal-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .preview-paper {
        background: white;
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(0, 0, 0, 0.04);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        transform-origin: top center;
        flex-shrink: 0;
      }
      .inner-grid {
        display: grid;
        width: 100%;
        height: 100%;
        flex-grow: 1;
        border-top: 1px dashed #cbd5e1;
        border-left: 1px dashed #cbd5e1;
        background-color: white;
      }

      .grid-plate {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(1, 1fr);
      }
      .grid-western {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }
      .grid-buffet {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }

      .card-preview-container {
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }
      .scaled-preview {
        transform-origin: center center;
        pointer-events: none;
      }

      /* Sort Buttons */
      .sort-btn {
        transition: all 0.2s;
      }
      .sort-btn.active {
        background: #006d4b;
        color: white;
        border-color: #006d4b;
      }
      .sort-btn:not(.active) {
        background: white;
        color: #64748b;
        border-color: #e2e8f0;
      }
      .sort-btn:not(.active):hover {
        background: #f8fafc;
        color: #334155;
      }

      @media print {
        body > *:not(#printArea) {
          display: none !important;
        }
        html,
        body {
          height: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: hidden !important;
          background: white;
        }
        #printArea {
          display: block !important;
          width: 100% !important;
          height: 100% !important;
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
        }
        .preview-paper {
          box-shadow: none !important;
          transform: none !important;
          margin: 0 !important;
          width: 100% !important;
          height: 100% !important;
          border: none !important;
        }
        #previewModal {
          display: none !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">
    <!-- Sidebar - Untouched -->
    <div id="sidebar-container" class="shrink-0 h-full z-20"></div>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto z-0 relative flex flex-col">
      <!-- Header -->
      <div
        class="bg-white border-b border-slate-200 px-8 py-6 sticky top-0 z-10"
      >
        <div
          class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4"
        >
          <div>
            <div class="flex items-center gap-3">
              <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">
                Profiles
              </h2>
              <span
                id="profileCount"
                class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-md text-xs font-bold border border-emerald-100"
                >0 รายการ</span
              >
            </div>
            <p class="text-slate-500 text-sm mt-1">
              Manage, edit, and print your saved event tags
            </p>
          </div>
          <button
            id="btnCreateNew"
            onclick="window.location.href = 'create.html'"
            class="bg-[#006d4b] text-white px-5 py-2.5 rounded-xl font-semibold shadow-sm hover:bg-[#005a3d] hover:shadow transition-all flex items-center justify-center gap-2 active:scale-95"
          >
            <span class="material-symbols-outlined text-[20px]"
              >add_circle</span
            >
            Create New Tag
          </button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="p-8 max-w-[1600px] w-full mx-auto">
        <!-- Filters Panel -->
        <div
          class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mb-6"
        >
          <!-- Top Row Search & Template -->
          <div class="flex flex-col md:flex-row gap-4 mb-4">
            <div class="flex-1 relative">
              <span
                class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]"
                >search</span
              >
              <input
                type="text"
                id="searchInput"
                onkeyup="filterCards()"
                placeholder="Search by event name (e.g. AIA)..."
                class="w-full pl-10 pr-4 h-11 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#006d4b]/20 focus:border-[#006d4b] outline-none text-sm transition-all"
              />
            </div>
            <div class="w-full md:w-64 relative shrink-0">
              <select
                id="sizeFilter"
                onchange="filterCards()"
                class="w-full appearance-none pl-4 pr-10 h-11 bg-slate-50 border border-slate-200 rounded-xl text-slate-600 outline-none focus:bg-white focus:ring-2 focus:ring-[#006d4b]/20 focus:border-[#006d4b] text-sm font-medium cursor-pointer transition-all"
              >
                <option value="all">All Template Sizes</option>
                <option value="Plate / Food Stall">Plate Service</option>
                <option value="Western Set">Western Set</option>
                <option value="Buffet / Coffee Break">Buffet</option>
              </select>
              <span
                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"
                >expand_more</span
              >
            </div>
          </div>

          <!-- Bottom Row Additional Filters -->
          <div class="flex flex-wrap items-center gap-4">
            <div class="relative w-full sm:w-auto">
              <select
                id="paperSizeFilter"
                onchange="filterCards()"
                class="w-full sm:w-auto appearance-none h-10 pl-4 pr-9 bg-white border border-slate-200 rounded-lg text-slate-600 text-sm outline-none cursor-pointer hover:bg-slate-50 transition-colors"
              >
                <option value="all">All Paper Sizes</option>
                <option value="A4">A4 Paper</option>
                <option value="A3">A3 Paper</option>
              </select>
              <span
                class="material-symbols-outlined absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px] pointer-events-none"
                >expand_more</span
              >
            </div>

            <div class="relative w-full sm:w-auto">
              <select
                id="creatorFilter"
                onchange="filterCards()"
                class="w-full sm:w-auto appearance-none h-10 pl-4 pr-9 bg-white border border-slate-200 rounded-lg text-slate-600 text-sm outline-none cursor-pointer hover:bg-slate-50 transition-colors"
              >
                <option value="all">All Creators</option>
                <option value="admin">Admin</option>
                <option value="super admin">Super Admin</option>
              </select>
              <span
                class="material-symbols-outlined absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px] pointer-events-none"
                >expand_more</span
              >
            </div>

            <div
              class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 h-10 w-full sm:w-auto"
            >
              <input
                type="date"
                id="dateStart"
                onchange="filterCards()"
                class="bg-transparent text-sm text-slate-600 outline-none h-full w-full sm:w-auto cursor-pointer"
              />
              <span class="text-slate-300 font-medium">-</span>
              <input
                type="date"
                id="dateEnd"
                onchange="filterCards()"
                class="bg-transparent text-sm text-slate-600 outline-none h-full w-full sm:w-auto cursor-pointer"
              />
            </div>

            <button
              onclick="clearFilters()"
              class="text-sm text-slate-500 hover:text-red-600 font-medium ml-auto transition-colors flex items-center gap-1.5 px-2 py-1 rounded-md hover:bg-red-50"
            >
              <span class="material-symbols-outlined text-[18px]"
                >filter_alt_off</span
              >
              Clear
            </button>
          </div>
        </div>

        <!-- Results & Sort Bar -->
        <div
          class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-200"
        >
          <div class="flex items-center gap-3">
            <div
              class="inline-flex items-center gap-2 bg-slate-100 border border-slate-200 rounded-full px-3 py-1 text-xs font-semibold text-slate-600"
            >
              <div class="w-2 h-2 rounded-full bg-[#006d4b]"></div>
              <span id="visibleCount">0</span> Shown
            </div>
            <div class="h-4 w-px bg-slate-300 hidden sm:block"></div>
            <div class="text-sm text-slate-500" id="resultsRangeText"></div>
          </div>

          <div class="flex items-center gap-2">
            <span
              class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mr-1 hidden sm:block"
              >Sort by</span
            >
            <button
              class="sort-btn active px-3 py-1.5 text-xs font-semibold rounded-lg border"
              id="sortNewest"
              onclick="setSortOrder('newest')"
            >
              Newest
            </button>
            <button
              class="sort-btn px-3 py-1.5 text-xs font-semibold rounded-lg border"
              id="sortOldest"
              onclick="setSortOrder('oldest')"
            >
              Oldest
            </button>
          </div>
        </div>

        <!-- Cards Grid -->
        <div
          id="cardGrid"
          class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 pb-12"
        ></div>
      </div>
    </main>

    <!-- Print Area -->
    <div id="printArea" class="hidden"></div>

    <!-- Preview Modal -->
    <div
      id="previewModal"
      class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center opacity-0 modal-transition"
    >
      <div
        class="bg-white rounded-2xl w-[95%] max-w-6xl h-[90vh] flex flex-col shadow-2xl transform scale-95 modal-transition overflow-hidden"
        id="previewModalContent"
      >
        <div
          class="bg-white px-6 py-4 border-b border-slate-200 flex justify-between items-center shrink-0 z-10"
        >
          <div>
            <h3
              id="modalTitle"
              class="text-xl font-bold text-slate-900 leading-tight"
            >
              Profile Name
            </h3>
            <div class="flex items-center gap-2 text-slate-500 mt-1">
              <span class="material-symbols-outlined text-[16px]"
                >straighten</span
              >
              <p id="modalSubtitle" class="text-sm font-medium">
                Template Size
              </p>
              <span class="w-1 h-1 rounded-full bg-slate-300 mx-1"></span>
              <span
                id="modalPaperSizeBadge"
                class="text-sm font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded"
                >A4</span
              >
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button
              id="modalPrintBtn"
              class="bg-[#006d4b] text-white px-5 py-2 rounded-xl font-semibold hover:bg-[#005a3d] transition-all flex items-center gap-2 active:scale-95 shadow-sm"
            >
              <span class="material-symbols-outlined text-[20px]">print</span>
              Print Preview
            </button>
            <button
              onclick="closePreviewModal()"
              class="w-10 h-10 flex justify-center items-center text-slate-400 hover:bg-slate-100 hover:text-slate-600 rounded-full transition-colors"
            >
              <span class="material-symbols-outlined text-[24px]">close</span>
            </button>
          </div>
        </div>
        <div
          id="modalBody"
          class="flex-1 overflow-auto flex justify-center items-start p-8 bg-slate-100 relative"
        >
          <div
            id="modalPaperWrapper"
            class="relative flex justify-center items-start shadow-xl"
          ></div>
        </div>
      </div>
    </div>

    <!-- Delete Modal -->
    <div
      id="deleteModal"
      class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden flex items-center justify-center opacity-0 modal-transition"
    >
      <div
        id="deleteModalContent"
        class="bg-white rounded-3xl w-[90%] max-w-sm p-8 flex flex-col items-center text-center shadow-2xl transform scale-95 modal-transition"
      >
        <div
          class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4"
        >
          <span class="material-symbols-outlined text-[32px]"
            >delete_forever</span
          >
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">ยืนยันการลบ</h3>
        <p class="text-slate-500 text-sm mb-8 leading-relaxed">
          คุณแน่ใจหรือไม่ว่าต้องการลบโปรไฟล์นี้?<br />ข้อมูลที่ถูกลบจะไม่สามารถกู้คืนได้
        </p>
        <div class="flex items-center gap-3 w-full">
          <button
            onclick="closeDeleteModal()"
            class="flex-1 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-xl hover:bg-slate-200 transition-colors"
          >
            ยกเลิก
          </button>
          <button
            onclick="executeDelete()"
            class="flex-1 py-2.5 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition-colors active:scale-95"
          >
            ใช่, ลบเลย
          </button>
        </div>
      </div>
    </div>

    <script src="sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="action-logger.js"></script>

    <script>
      const TEMPLATE_CONFIGS = {
        "Plate / Food Stall": {
          orientation: "landscape",
          slots_count: 2,
          grid_class: "grid-plate",
          hide_allergies: false,
          w: 1123,
          h: 794,
        },
        "Western Set": {
          orientation: "landscape",
          slots_count: 4,
          grid_class: "grid-western",
          hide_allergies: false,
          w: 1123,
          h: 794,
        },
        "Buffet / Coffee Break": {
          orientation: "landscape",
          slots_count: 6,
          grid_class: "grid-buffet",
          hide_allergies: false,
          w: 1123,
          h: 794,
        },
      };

      let profileToDeleteId = null;
      let currentSortOrder = "newest";

      function getPaperDimensions(templateName, paperSize) {
        const config = TEMPLATE_CONFIGS[templateName];
        if (!config) return { w: 1123, h: 794 };
        if (paperSize === "A3") {
          return {
            w: config.orientation === "landscape" ? 1587 : 1123,
            h: config.orientation === "landscape" ? 1123 : 1587,
          };
        }
        return {
          w: config.orientation === "landscape" ? 1123 : 794,
          h: config.orientation === "landscape" ? 794 : 1123,
        };
      }

      function getSavedTags() {
        return JSON.parse(localStorage.getItem("savedTags")) || [];
      }

      function setSortOrder(order) {
        currentSortOrder = order;
        document
          .getElementById("sortNewest")
          .classList.toggle("active", order === "newest");
        document
          .getElementById("sortOldest")
          .classList.toggle("active", order === "oldest");
        loadSavedTags();
      }

      function updateResultsBar(visibleCount, totalCount) {
        document.getElementById("visibleCount").textContent = visibleCount;
        const rangeEl = document.getElementById("resultsRangeText");
        if (visibleCount === totalCount) {
          rangeEl.innerHTML = `Total <span class="font-bold text-slate-800">${totalCount}</span> profiles`;
        } else {
          rangeEl.innerHTML = `Showing <span class="font-bold text-slate-800">${visibleCount}</span> of <span class="font-bold text-slate-800">${totalCount}</span> profiles`;
        }
      }

      function loadSavedTags() {
        const cardGrid = document.getElementById("cardGrid");
        const savedTags = getSavedTags();
        const userData = JSON.parse(localStorage.getItem("userData"));
        const isStaff = userData && userData.role === "Staff";
        const currentUserRole =
          userData && userData.role ? userData.role : "Super Admin";

        document.getElementById("profileCount").innerText =
          `${savedTags.length} รายการ`;
        cardGrid.innerHTML = "";

        if (savedTags.length === 0) {
          cardGrid.innerHTML = `
            <div class="col-span-full py-24 flex flex-col items-center justify-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
              <span class="material-symbols-outlined text-[48px] mb-3 opacity-50">inventory_2</span>
              <p class="text-lg font-medium">No Profiles Found</p>
              <p class="text-sm mt-1">Try adjusting your filters or create a new tag.</p>
            </div>`;
          updateResultsBar(0, 0);
          return;
        }

        const sortedTags = savedTags.slice().sort((a, b) => {
          const da = new Date(a.createdAt).getTime();
          const db = new Date(b.createdAt).getTime();
          return currentSortOrder === "newest" ? db - da : da - db;
        });

        sortedTags.forEach((tag, index) => {
          const displayOrder = index + 1;
          const dims = getPaperDimensions(tag.templateName, tag.paperSize);
          const creatorName = tag.createdBy || currentUserRole;

          const dateObj = new Date(tag.createdAt);
          const formattedDate = isNaN(dateObj)
            ? tag.createdAt
            : dateObj
                .toLocaleDateString("en-US", {
                  month: "short",
                  day: "numeric",
                  year: "numeric",
                })
                .toUpperCase();

          const manageButtons = isStaff
            ? ""
            : `
              <button onclick="window.location.href='create.html?edit=${tag.id}'" title="Edit" class="w-11 h-11 flex-shrink-0 flex justify-center items-center rounded-xl bg-slate-50 text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors border border-slate-100">
                <span class="material-symbols-outlined text-[20px]">edit</span>
              </button>
              <button onclick="confirmDelete('${tag.id}')" title="Delete" class="w-11 h-11 flex-shrink-0 flex justify-center items-center rounded-xl bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors border border-slate-100">
                <span class="material-symbols-outlined text-[20px]">delete_outline</span>
              </button>
            `;

          const cardHTML = `
            <div class="group bg-white rounded-3xl border border-slate-200 overflow-hidden hover:shadow-xl hover:shadow-slate-200/50 hover:border-slate-300 transition-all duration-300 flex flex-col relative profile-card"
                 data-name="${tag.title}" data-size="${tag.templateName}" data-papersize="${tag.paperSize || "A4"}" data-creator="${creatorName}" data-date="${tag.createdAt}" data-order="${displayOrder}">
              
              <!-- Preview Area -->
              <div onclick="openPreviewModal('${tag.id}')" class="card-preview-container h-48 bg-slate-50 border-b border-slate-100 cursor-pointer relative">
                <!-- Overlay Hover -->
                <div class="absolute inset-0 bg-slate-900/5 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-center justify-center backdrop-blur-[1px]">
                  <span class="bg-white/95 text-slate-800 px-4 py-2 rounded-full font-bold text-xs shadow-lg flex items-center gap-1.5 transform translate-y-2 group-hover:translate-y-0 transition-all duration-300">
                    <span class="material-symbols-outlined text-[16px]">visibility</span> Preview
                  </span>
                </div>
                <!-- Number Badge -->
                <div class="absolute top-3 left-3 z-20 bg-white/90 backdrop-blur text-slate-700 font-bold text-xs px-2.5 py-1 rounded-md shadow-sm border border-slate-100">#${displayOrder}</div>
                <!-- Scaled Paper -->
                <div class="scaled-preview" id="mini-preview-${tag.id}"></div>
              </div>
              
              <!-- Info Area -->
              <div class="p-5 flex flex-col flex-1">
                <div class="flex justify-between items-start gap-3 mb-2">
                  <h3 class="font-bold text-[17px] text-slate-800 leading-snug line-clamp-1 flex-1" title="${tag.title}">${tag.title}</h3>
                  <span class="shrink-0 bg-blue-50 text-blue-600 text-[11px] font-bold px-2 py-1 rounded border border-blue-100">${tag.paperSize || "A4"}</span>
                </div>
                
                <div class="flex items-center gap-1.5 text-slate-500 text-sm mb-4 font-medium">
                  <span class="material-symbols-outlined text-[18px]">straighten</span>
                  <span>${tag.templateName}</span>
                </div>
                
                <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-100">
                  <div class="flex items-center gap-1 text-[12px] font-medium text-slate-400" title="Created on">
                    <span class="material-symbols-outlined text-[16px]">calendar_today</span>
                    ${formattedDate}
                  </div>
                  <div class="flex items-center gap-1 text-[12px] font-semibold text-emerald-600 uppercase" title="Creator">
                    <span class="material-symbols-outlined text-[16px]">person</span>
                    ${creatorName}
                  </div>
                </div>
                
                <!-- Actions -->
                <div class="flex items-center gap-2 mt-4">
                  ${manageButtons}
                  <button onclick="executePrint('${tag.id}')" class="flex-1 h-11 flex justify-center items-center gap-2 rounded-xl bg-slate-800 hover:bg-black text-white font-semibold transition-colors shadow-sm active:scale-95">
                    <span class="material-symbols-outlined text-[18px]">print</span> Print
                  </button>
                </div>
              </div>
            </div>`;

          cardGrid.insertAdjacentHTML("beforeend", cardHTML);

          const miniPreview = document.getElementById(`mini-preview-${tag.id}`);
          miniPreview.innerHTML = generatePaperHTML(tag);
          const scale = Math.min(260 / dims.w, 150 / dims.h);
          miniPreview.style.transform = `scale(${scale})`;
        });

        updateResultsBar(sortedTags.length, savedTags.length);
      }

      function generatePaperHTML(tagData) {
        const config = TEMPLATE_CONFIGS[tagData.templateName];
        if (!config) return "";

        let slotsHTML = "";
        const slotsData = tagData.slotsData || {};
        const dims = getPaperDimensions(
          tagData.templateName,
          tagData.paperSize,
        );

        const isBuffet = config.slots_count === 6;
        const titleSize = isBuffet ? "24px" : "36px";
        const subSize = isBuffet ? "16px" : "24px";

        for (let i = 1; i <= config.slots_count; i++) {
          const menu = slotsData[i] || {};
          const slotBgUrl = menu.bgUrl || "";
          const bgHtml = slotBgUrl
            ? `<img src="${slotBgUrl}" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 0;">`
            : "";
          const nameThHtml = menu.name_th
            ? `<div style="font-family: 'Sarabun', sans-serif; font-weight: 700; color: #1e293b; font-size: ${titleSize}; margin-bottom: 4px; white-space: pre-line; line-height: 1.3;">${menu.name_th}</div>`
            : "";
          const nameEnHtml = menu.name_en
            ? `<div style="font-family: 'Sarabun', sans-serif; font-weight: 500; color: #475569; font-size: ${subSize}; white-space: pre-line; line-height: 1.3;">${menu.name_en}</div>`
            : "";
          const remarkHtml = menu.remark
            ? `<div style="font-family: 'Sarabun', sans-serif; font-weight: 600; color: #e11d48; font-size: 14px; margin-top: 8px;">${menu.remark}</div>`
            : "";

          slotsHTML += `
            <div class="slot" style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: white; border-right: 1px dashed #cbd5e1; border-bottom: 1px dashed #cbd5e1; text-align: center; overflow: hidden;">
                ${bgHtml}
                <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 20px;">
                    ${nameThHtml}
                    ${nameEnHtml}
                    ${remarkHtml}
                </div>
            </div>`;
        }

        return `<div class="preview-paper" style="width: ${dims.w}px; height: ${dims.h}px;"><div class="inner-grid ${config.grid_class}">${slotsHTML}</div></div>`;
      }

      function openPreviewModal(tagId) {
        const tag = getSavedTags().find((t) => t.id === tagId);
        if (!tag) return;
        const modal = document.getElementById("previewModal");
        modal.classList.remove("hidden");
        document.getElementById("modalTitle").innerText = tag.title;
        document.getElementById("modalSubtitle").innerText = tag.templateName;
        document.getElementById("modalPaperSizeBadge").innerText =
          tag.paperSize || "A4";

        const wrapper = document.getElementById("modalPaperWrapper");
        wrapper.innerHTML = generatePaperHTML(tag);
        const dims = getPaperDimensions(tag.templateName, tag.paperSize);

        setTimeout(() => {
          const modalBody = document.getElementById("modalBody");
          const scale = Math.min(
            (modalBody.clientWidth - 64) / dims.w,
            (modalBody.clientHeight - 64) / dims.h,
          );
          const paper = wrapper.querySelector(".preview-paper");
          paper.style.transform = `scale(${scale})`;
          wrapper.style.width = dims.w * scale + "px";
          wrapper.style.height = dims.h * scale + "px";

          modal.classList.add("opacity-100");
          document
            .getElementById("previewModalContent")
            .classList.remove("scale-95");
        }, 50);

        document.getElementById("modalPrintBtn").onclick = () =>
          executePrint(tagId);
      }

      function closePreviewModal() {
        document.getElementById("previewModal").classList.remove("opacity-100");
        document
          .getElementById("previewModalContent")
          .classList.add("scale-95");
        setTimeout(
          () => document.getElementById("previewModal").classList.add("hidden"),
          300,
        );
      }

      function confirmDelete(tagId) {
        profileToDeleteId = tagId;
        const modal = document.getElementById("deleteModal");
        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.add("opacity-100");
          document
            .getElementById("deleteModalContent")
            .classList.remove("scale-95");
        }, 10);
      }

      function closeDeleteModal() {
        const modal = document.getElementById("deleteModal");
        modal.classList.remove("opacity-100");
        document.getElementById("deleteModalContent").classList.add("scale-95");
        setTimeout(() => {
          modal.classList.add("hidden");
          profileToDeleteId = null;
        }, 300);
      }

      function executeDelete() {
        if (!profileToDeleteId) return;
        let savedTags = getSavedTags();
        const tag = savedTags.find((t) => t.id === profileToDeleteId);
        if (tag)
          logSystemActivity("DELETE", `ลบโปรไฟล์ป้ายอาหาร: ${tag.title}`);

        savedTags = savedTags.filter((tag) => tag.id !== profileToDeleteId);
        localStorage.setItem("savedTags", JSON.stringify(savedTags));
        closeDeleteModal();
        loadSavedTags();
      }

      function executePrint(tagId) {
        const tag = getSavedTags().find((t) => t.id === tagId);
        if (!tag) return;
        logSystemActivity("PRINT", `สั่งพิมพ์ป้ายอาหาร Profile: ${tag.title}`);
        const paperSize = tag.paperSize || "A4";
        const printArea = document.getElementById("printArea");
        printArea.innerHTML = generatePaperHTML(tag);

        let style = document.getElementById("printPageOrientation");
        if (!style) {
          style = document.createElement("style");
          style.id = "printPageOrientation";
          document.head.appendChild(style);
        }
        style.innerHTML = `@page { size: ${paperSize} landscape; margin: 0mm; } body { margin: 0; }`;

        printArea.classList.remove("hidden");
        setTimeout(() => {
          window.print();
          printArea.classList.add("hidden");
        }, 500);
      }

      function clearFilters() {
        document.getElementById("searchInput").value = "";
        document.getElementById("sizeFilter").value = "all";
        document.getElementById("paperSizeFilter").value = "all";
        document.getElementById("creatorFilter").value = "all";
        document.getElementById("dateStart").value = "";
        document.getElementById("dateEnd").value = "";
        filterCards();
      }

      function filterCards() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const size = document.getElementById("sizeFilter").value;
        const pSize = document.getElementById("paperSizeFilter").value;
        const creator = document
          .getElementById("creatorFilter")
          .value.toLowerCase();
        const start = document.getElementById("dateStart").value
          ? new Date(document.getElementById("dateStart").value).setHours(
              0,
              0,
              0,
              0,
            )
          : null;
        const end = document.getElementById("dateEnd").value
          ? new Date(document.getElementById("dateEnd").value).setHours(
              23,
              59,
              59,
              999,
            )
          : null;

        const allCards = Array.from(
          document.getElementsByClassName("profile-card"),
        );
        const totalCount = getSavedTags().length;
        let visibleCount = 0;

        allCards.forEach((card) => {
          const name = card.dataset.name.toLowerCase();
          const dSize = card.dataset.size;
          const dpSize = card.dataset.papersize;
          const dCreator = card.dataset.creator.toLowerCase();
          const dDate = new Date(card.dataset.date).getTime();

          let match =
            name.includes(q) &&
            (size === "all" || dSize === size) &&
            (pSize === "all" || dpSize === pSize) &&
            (creator === "all" || dCreator === creator);

          if (start && dDate < start) match = false;
          if (end && dDate > end) match = false;

          card.style.display = match ? "flex" : "none";
          if (match) visibleCount++;
        });

        updateResultsBar(visibleCount, totalCount);
      }

      loadSavedTags();
    </script>
  </body>
</html>
